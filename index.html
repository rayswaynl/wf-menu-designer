<script>
// ============================================================
// Constants
// ============================================================

// Default 16:9 stage size (logical pixels at 100% zoom)
let STAGE_W = 960;  // logical display width; maps to 1920px at 2x, etc.
let STAGE_H = 540;  // 16:9
let SCREEN_W = 1920;
let SCREEN_H = 1080;

// SafeZone constants (16:9 preview)
const SZ = { X: 0.07, Y: 0.07, W: 0.86, H: 0.86 };

// ============================================================
// State
// ============================================================
let uiData = null;           // parsed ui.json
let currentDisplay = null;   // name of loaded display
let displayData = null;      // display object from uiData.displays
let selectedCtrl = null;     // primary selected control
let selectedSet = new Set(); // multi-select set of ctrl objects
let zoom = 1.0;
let editMode = false;
let dragging = null;

// Pro editing state
let undoStack = [];          // array of {background:[], controls:[]} snapshots
let redoStack = [];
let clipboard = [];          // copied control snapshots
let ctrlMeta = new WeakMap();// ctrl → {locked, hidden, groupId}
let groupCounter = 0;
let marqueeState = null;     // {startX,startY} in stage px during marquee drag
let snapGuides = [];         // active guide elements
let altCycleStack = [];      // for alt-click overlap cycling
let altCyclePos = 0;

// ---- Undo/redo helpers ----
function snapshotState() {
  return {
    background: JSON.parse(JSON.stringify(displayData.background || [])),
    controls: JSON.parse(JSON.stringify(displayData.controls || [])),
  };
}

function pushUndo() {
  undoStack.push(snapshotState());
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}

function applySnapshot(snap) {
  // Restore props in-place so WeakMap meta is preserved where possible
  displayData.background = snap.background;
  displayData.controls = snap.controls;
  // Re-tag sections
  for (const c of (displayData.background || [])) c._section = 'background';
  for (const c of (displayData.controls || [])) c._section = 'controls';
  selectedCtrl = null;
  selectedSet.clear();
  renderAll();
}

function undoAction() {
  if (!undoStack.length) return;
  redoStack.push(snapshotState());
  applySnapshot(undoStack.pop());
  updateUndoButtons();
}

function redoAction() {
  if (!redoStack.length) return;
  undoStack.push(snapshotState());
  applySnapshot(redoStack.pop());
  updateUndoButtons();
}

function updateUndoButtons() {
  const u = document.getElementById('et-undo');
  const r = document.getElementById('et-redo');
  if (u) u.disabled = !undoStack.length;
  if (r) r.disabled = !redoStack.length;
}

// ---- Meta helpers ----
function getMeta(ctrl) {
  if (!ctrlMeta.has(ctrl)) ctrlMeta.set(ctrl, {locked: false, hidden: false, groupId: null});
  return ctrlMeta.get(ctrl);
}

// ---- All controls flat ----
function allCtrls() {
  if (!displayData) return [];
  return [...(displayData.background || []), ...(displayData.controls || [])];
}

// ---- Next free IDC ----
function nextIdc() {
  const used = new Set(allCtrls().map(c => c.idc).filter(v => v !== undefined && v >= 0));
  let id = 1000;
  while (used.has(id)) id++;
  return id;
}

// ============================================================
// Helpers
// ============================================================

function rgba(arr, alpha) {
  if (!Array.isArray(arr) || arr.length < 3) return 'rgba(0,0,0,0)';
  const r = Math.round(arr[0] * 255);
  const g = Math.round(arr[1] * 255);
  const b = Math.round(arr[2] * 255);
  const a = alpha !== undefined ? alpha : (arr[3] !== undefined ? arr[3] : 1);
  return `rgba(${r},${g},${b},${a})`;
}

function px(frac, dim) {
  // Convert 0..1 fraction to logical pixel for current stage
  return frac * dim;
}

/**
 * Evaluate a SafeZone position expression.
 * Handles strings like "0.882604 * safezoneW + safezoneX",
 * "(SafeZoneW + SafeZoneX) - 0.0392157", "SafezoneX + 0.01 + \t0.3",
 * min/max calls, parentheses, and plain numbers.
 * Case-insensitive for all safezone[X|Y|W|H] variants.
 */
function evalSZ(val) {
  if (typeof val === 'number') return val;
  if (typeof val == null || val === undefined) return 0;
  if (typeof val !== 'string') return 0;

  // Replace all case variants of safezone[XYWH] with numeric constants.
  // Uses a single case-insensitive regex so SafezoneX, SAFEZONEW, safezoneH etc. all match.
  const expr = val
    .replace(/\t/g, ' ')
    .replace(/[Ss]afe[Zz]one[Xx]/gi, SZ.X)
    .replace(/[Ss]afe[Zz]one[Yy]/gi, SZ.Y)
    .replace(/[Ss]afe[Zz]one[Ww]/gi, SZ.W)
    .replace(/[Ss]afe[Zz]one[Hh]/gi, SZ.H);

  try {
    // eslint-disable-next-line no-new-func
    return Function('"use strict"; return (' + expr + ')')();
  } catch(e) {
    return parseFloat(val) || 0;
  }
}

/**
 * Clean a display text string:
 * "$STR_WF_MAIN_Purchase_Units" => "Purchase Units"
 * "$STR_RUBHUD_Money" => "Money"
 */
function cleanText(t) {
  if (!t || typeof t !== 'string') return '';
  if (!t.startsWith('$')) return t;
  return t
    .replace(/^\$STR_WF_MAIN_/, '')
    .replace(/^\$STR_WF_/, '')
    .replace(/^\$STR_RUBHUD_/, '')
    .replace(/^\$STR_/, '')
    .replace(/_/g, ' ')
    .trim();
}

/**
 * Get a WYSIWYG class from baseClass + resolved props.
 * Returns {wClass, subType} where wClass is the CSS class and subType is for further refinement.
 */
function getWClass(ctrl) {
  const base = (ctrl.baseClass || ctrl.rscBase || '').toLowerCase();
  const r = ctrl.resolved || {};

  if (base.includes('shortcutbuttonmain') || base === 'rscshotcutbuttonmain') return 'shortcutbuttonmain';
  if (base.includes('shortcutbutton')) return 'shortcutbutton';
  if (base.includes('button_exit') || base === 'rscbutton_exit') return 'button-exit';
  if (base.includes('button_back')) return 'button-main'; // treat << like main
  if (base.includes('button_main') || base === 'rscbutton_main') return 'button-main';
  if (base.includes('button')) return 'button';
  if (base === 'iguiback') return 'iguiback';
  if (base === 'rscframe') return 'rscframe';
  if (base.includes('mapcontrol') || base.includes('rscmapcontrol')) return 'mapcontrol';
  if (base.includes('listnbox') || base.includes('listboxa') || base === 'rsclistnbox') return 'listbox';
  if (base.includes('listbox')) return 'listbox';
  if (base.includes('combo')) return 'combo';
  if (base.includes('edit')) return 'edit';
  if (base.includes('clickabletext')) return 'picture';
  if (base.includes('picture') || base.includes('picturekeeper')) return 'picture';
  if (base.includes('structuredtext')) return 'structuredtext';
  if (base.includes('xsliderh')) return 'slider';
  if (base.includes('controlsgroup') || base.includes('rsccontrolsgroup')) return 'ctrlgroup';

  // Fallback by type number
  const type = r.type !== undefined ? r.type : (ctrl.props && ctrl.props.type);
  switch(type) {
    case 1: return 'button';
    case 2: return 'edit';
    case 4: return 'combo';
    case 5: return 'listbox';
    case 11: return 'picture';
    case 13: return 'structuredtext';
    case 15: return 'ctrlgroup';
    case 16: return 'shortcutbutton';
    case 43: return 'slider';
    case 101: return 'mapcontrol';
    case 102: return 'listbox';
    default: return 'rsctext';
  }
}

// Determine if a control is a background control (section)
function isBgCtrl(ctrl, display) {
  return (display.background || []).includes(ctrl) ||
    (ctrl._section === 'background');
}

// ============================================================
// Load ui.json
// ============================================================
async function loadUiJson() {
  try {
    const r = await fetch('assets/data/ui.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    uiData = await r.json();
    buildDisplayPicker();
    // Auto-load WF_Menu
    loadDisplay('WF_Menu');
  } catch(e) {
    console.error('Failed to load ui.json:', e);
    setStatus('Failed to load ui.json: ' + e.message, 'err');
  }
}

// ============================================================
// Display picker
// ============================================================
function buildDisplayPicker() {
  const sel = document.getElementById('display-picker');
  sel.innerHTML = '';

  const categories = {};
  for (const [name, d] of Object.entries(uiData.displays)) {
    const cat = d.category || 'dialog';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(name);
  }

  const catOrder = ['dialog', 'hud'];
  for (const cat of catOrder) {
    if (!categories[cat]) continue;
    const grp = document.createElement('optgroup');
    grp.label = cat.toUpperCase() + 'S';
    for (const name of categories[cat]) {
      const d = uiData.displays[name];
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name + ' (idd ' + d.idd + ')';
      grp.appendChild(opt);
    }
    sel.appendChild(grp);
  }

  sel.addEventListener('change', () => {
    if (sel.value) loadDisplay(sel.value);
  });
}

// ============================================================
// Load a display
// ============================================================
function loadDisplay(name) {
  if (!uiData || !uiData.displays[name]) return;
  currentDisplay = name;
  displayData = uiData.displays[name];
  selectedCtrl = null;
  selectedSet.clear();
  undoStack = [];
  redoStack = [];
  ctrlMeta = new WeakMap();
  updateUndoButtons();

  // Tag controls with section
  for (const c of (displayData.background || [])) c._section = 'background';
  for (const c of (displayData.controls || [])) c._section = 'controls';

  // Update picker
  const sel = document.getElementById('display-picker');
  sel.value = name;

  // Update chip
  const total = (displayData.background || []).length + (displayData.controls || []).length;
  document.getElementById('ctrl-count-chip').innerHTML = '<b>' + total + '</b> controls';
  document.getElementById('dialog-chip').textContent = name + ' · idd ' + displayData.idd;

  renderAll();
}

// ============================================================
// Coordinate conversion
// ============================================================
/**
 * Look up a geometry value (x/y/w/h) for a control, with sibling-inheritance
 * fallback for SafeZone displays.  In Arma SQF, controls in the same controls[]
 * block can omit x/w/h and inherit them from the nearest preceding sibling that
 * shares the same baseClass.  The generator preserves this faithfully (null in
 * props means "inherited"), so we replicate the lookup here.
 */
function resolveGeo(ctrl, key, posSystem) {
  // Try resolved first, then props
  const r = ctrl.resolved || {};
  const p = ctrl.props || {};

  let raw = r[key] !== undefined ? r[key] : p[key];

  // If still null/undefined, apply in-array class inheritance.
  // In Arma SQF, a control can declare baseClass = "AnotherControlName" where
  // that other control is a sibling in the same controls[] block (not a global
  // baseClass). Walk the inheritance chain: if ctrl.baseClass matches another
  // control's NAME in the same display, recurse into that control for the value.
  if ((raw === null || raw === undefined) && displayData) {
    const all = [...(displayData.background || []), ...(displayData.controls || [])];
    const myBase = ctrl.baseClass || '';

    // First: check if baseClass names a sibling control (in-array inheritance)
    const namedParent = myBase ? all.find(c => c.name === myBase) : null;
    if (namedParent) {
      const pr = namedParent.resolved || {};
      const pp = namedParent.props || {};
      raw = pr[key] !== undefined ? pr[key] : pp[key];
    }

    // If still missing, fall back to nearest preceding sibling with same baseClass
    if (raw === null || raw === undefined) {
      const myIdx = all.indexOf(ctrl);
      const myBaseLow = myBase.toLowerCase();
      for (let i = myIdx - 1; i >= 0; i--) {
        const sib = all[i];
        if ((sib.baseClass || '').toLowerCase() !== myBaseLow) continue;
        const sr = sib.resolved || {};
        const sp = sib.props || {};
        const sibRaw = sr[key] !== undefined ? sr[key] : sp[key];
        if (sibRaw !== null && sibRaw !== undefined) { raw = sibRaw; break; }
      }
    }
  }

  if (raw === null || raw === undefined) {
    // Sensible defaults: x/y → 0, w → 0.1, h → 0.04
    raw = (key === 'w') ? 0.1 : (key === 'h') ? 0.04 : 0;
  }

  return posSystem === 'safezone' ? evalSZ(raw) : (parseFloat(raw) || 0);
}

function ctrlPx(ctrl) {
  // Returns {left, top, width, height} in logical stage pixels
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';

  const xf = resolveGeo(ctrl, 'x', posSystem);
  const yf = resolveGeo(ctrl, 'y', posSystem);
  const wf = resolveGeo(ctrl, 'w', posSystem);
  const hf = resolveGeo(ctrl, 'h', posSystem);

  return {
    left: xf * STAGE_W,
    top: yf * STAGE_H,
    width: Math.max(2, wf * STAGE_W),
    height: Math.max(2, hf * STAGE_H)
  };
}

// ============================================================
// WYSIWYG Control rendering
// ============================================================
function buildControlEl(ctrl, zIndex) {
  const r = ctrl.resolved || ctrl.props || {};
  const p = ctrl.props || {};
  const wclass = getWClass(ctrl);
  const geo = ctrlPx(ctrl);
  const isSelected = ctrl === selectedCtrl;
  const isMulti = selectedSet.has(ctrl) && ctrl !== selectedCtrl;
  const meta = getMeta(ctrl);

  const el = document.createElement('div');
  let cls = 'ctrl';
  if (editMode) cls += ' edit-mode';
  if (isSelected) cls += ' selected';
  else if (selectedSet.has(ctrl)) cls += ' multi-sel';
  if (meta.locked) cls += ' ctrl-locked';
  if (meta.hidden) cls += ' ctrl-hidden';
  if (meta.groupId !== null) cls += ' grouped';
  el.className = cls;
  el.dataset.name = ctrl.name || '';
  el.dataset.ctrlIdx = allCtrls().indexOf(ctrl);

  // Base geometry
  el.style.left = (geo.left * zoom) + 'px';
  el.style.top = (geo.top * zoom) + 'px';
  el.style.width = (geo.width * zoom) + 'px';
  el.style.height = (geo.height * zoom) + 'px';
  el.style.zIndex = zIndex;

  // Font size from sizeEx: sizeEx is fraction of screen height
  const sizeEx = r.sizeEx !== undefined ? r.sizeEx : 0.03;
  const fontPx = sizeEx * STAGE_H * zoom;

  // Apply WYSIWYG style based on type
  switch (wclass) {
    case 'iguiback': {
      el.classList.add('wt-iguiback');
      const bg = r.colorBackground || p.colorBackground;
      if (Array.isArray(bg)) el.style.background = rgba(bg);
      break;
    }

    case 'rscframe': {
      el.classList.add('wt-rscframe');
      const ct = r.colorText || p.colorText || [1,1,1,1];
      el.style.borderColor = rgba(ct);
      break;
    }

    case 'mapcontrol': {
      el.classList.add('wt-mapcontrol');
      const inner = document.createElement('div');
      inner.className = 'map-label';
      inner.textContent = 'MAP';
      inner.style.fontSize = Math.max(8, fontPx * 0.8) + 'px';
      el.appendChild(inner);
      break;
    }

    case 'shortcutbuttonmain': {
      el.classList.add('wt-shortcutbuttonmain');
      const color = r.color || p.color || [0.2588, 0.7137, 1, 1];
      el.style.borderColor = rgba(color);
      el.style.boxShadow = `inset 0 0 ${geo.width*zoom*0.1}px ${rgba(color, 0.08)}, 0 0 ${geo.width*zoom*0.05}px ${rgba(color, 0.25)}`;

      const iconDiv = document.createElement('div');
      iconDiv.className = 'sb-icon';
      iconDiv.style.fontSize = Math.max(7, fontPx * 0.9) + 'px';
      iconDiv.style.color = rgba(color, 0.7);
      iconDiv.style.borderRightColor = rgba(color, 0.35);
      iconDiv.style.background = rgba(color, 0.1);
      iconDiv.innerHTML = '&#9632;'; // placeholder icon

      const labelDiv = document.createElement('div');
      labelDiv.className = 'sb-label';
      // In preview: show real text only. In edit: fall back to ctrl.name so tiles are identifiable.
      const rawTxtSBM = r.text !== undefined ? r.text : p.text;
      const txt = cleanText(rawTxtSBM || (editMode ? ctrl.name : '') || '');
      labelDiv.textContent = txt;
      labelDiv.style.fontSize = Math.max(7, fontPx * 0.95) + 'px';

      el.appendChild(iconDiv);
      el.appendChild(labelDiv);
      break;
    }

    case 'shortcutbutton': {
      el.classList.add('wt-shortcutbutton');
      const color = r.color || p.color || [0.543, 0.574, 0.41, 1];
      el.style.borderColor = rgba(color);

      const iconDiv = document.createElement('div');
      iconDiv.className = 'sb-icon';
      iconDiv.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      iconDiv.style.color = rgba(color, 0.8);
      iconDiv.style.borderRightColor = rgba(color, 0.3);
      iconDiv.style.background = rgba(color, 0.08);
      iconDiv.innerHTML = '&#9632;';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'sb-label';
      const rawTxtSB = r.text !== undefined ? r.text : p.text;
      labelDiv.textContent = cleanText(rawTxtSB || (editMode ? ctrl.name : '') || '');
      labelDiv.style.fontSize = Math.max(6, fontPx * 0.85) + 'px';

      el.appendChild(iconDiv);
      el.appendChild(labelDiv);
      break;
    }

    case 'button':
    case 'button-main':
    case 'button-exit': {
      el.classList.add('wt-rscbutton');
      const bg = r.colorBackground || p.colorBackground;
      const ct = r.colorText || p.colorText || [1,1,1,0.8];

      if (wclass === 'button-main') {
        el.classList.add('wt-rscbutton-main');
      } else if (wclass === 'button-exit') {
        el.classList.add('wt-rscbutton-exit');
      } else if (Array.isArray(bg)) {
        el.style.background = rgba(bg);
      }

      el.style.color = rgba(ct);
      el.style.fontSize = Math.max(7, fontPx) + 'px';

      const rawTxtBtn = r.text !== undefined ? r.text : p.text;
      el.textContent = cleanText(rawTxtBtn || (editMode ? ctrl.name : '') || '');
      break;
    }

    case 'listbox': {
      el.classList.add('wt-listbox');
      const bg = r.colorBackground || p.colorBackground || [0,0,0,1];
      if (Array.isArray(bg)) el.style.background = rgba(bg);

      const header = document.createElement('div');
      header.className = 'lb-header';
      // Listboxes show their name in the header in both modes — it's a structural label, not text content
      header.textContent = ctrl.name || '';
      header.style.fontSize = Math.max(6, fontPx * 0.75) + 'px';

      const rows = document.createElement('div');
      rows.className = 'lb-rows';
      // Render a few sample rows
      const sampleRows = ['Item 1', 'Item 2', 'Item 3', 'Item 4'];
      sampleRows.forEach((txt, i) => {
        const row = document.createElement('div');
        row.className = 'lb-row' + (i === 0 ? ' sel' : '');
        row.textContent = txt;
        row.style.fontSize = Math.max(5, fontPx * 0.7) + 'px';
        rows.appendChild(row);
      });

      el.appendChild(header);
      el.appendChild(rows);
      break;
    }

    case 'combo': {
      el.classList.add('wt-combo');
      const ct = r.colorText || p.colorText || [1,1,1,0.75];
      const color = r.color || p.color || [0.2588, 0.7137, 1, 1];

      const textEl = document.createElement('div');
      textEl.className = 'combo-text';
      const rawTxtCombo = r.text !== undefined ? r.text : p.text;
      textEl.textContent = cleanText(rawTxtCombo || '') || '---';
      textEl.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      textEl.style.color = rgba(ct);

      const arrowEl = document.createElement('div');
      arrowEl.className = 'combo-arrow';
      arrowEl.innerHTML = '&#9660;';
      arrowEl.style.color = rgba(color);
      arrowEl.style.fontSize = Math.max(6, fontPx * 0.7) + 'px';

      el.appendChild(textEl);
      el.appendChild(arrowEl);
      break;
    }

    case 'edit': {
      el.classList.add('wt-edit');
      // The ::after pseudo-element handles the cursor
      const inner = document.createElement('div');
      inner.className = 'edit-inner';
      inner.textContent = cleanText(r.text || p.text || '') || '';
      inner.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      el.appendChild(inner);
      // Remove cursor in preview if text has content
      if (inner.textContent) el.style.setProperty('--edit-cursor-opacity', '0');
      break;
    }

    case 'picture': {
      el.classList.add('wt-picture');
      const ct = r.color || r.colorText || p.colorText || [0.75, 0.75, 0.75, 1];
      const colorVal = rgba(ct);
      el.style.borderColor = rgba(ct, 0.3);

      const iconDiv = document.createElement('div');
      iconDiv.className = 'pic-icon';
      iconDiv.style.color = colorVal;

      // Icon placeholder square
      const sq = document.createElement('div');
      sq.style.cssText = `width:${Math.max(8, geo.width*zoom*0.35)}px;height:${Math.max(8, geo.height*zoom*0.6)}px;border:1px solid currentColor;opacity:.5;border-radius:2px`;
      iconDiv.appendChild(sq);

      const lbl = document.createElement('div');
      lbl.style.cssText = `font-size:${Math.max(5, fontPx*0.55)}px;opacity:.6;margin-top:1px;overflow:hidden;max-width:${geo.width*zoom*0.9}px;text-align:center;white-space:nowrap;text-overflow:ellipsis`;
      const rawTxtPic = r.text !== undefined ? r.text : p.text;
      lbl.textContent = cleanText(rawTxtPic || '');
      iconDiv.appendChild(lbl);

      el.appendChild(iconDiv);
      break;
    }

    case 'structuredtext': {
      el.classList.add('wt-structuredtext');
      const ct = r.colorText || p.colorText || [1, 1, 0.7, 1];
      el.style.color = rgba(ct);
      el.style.fontSize = Math.max(6, fontPx * 0.85) + 'px';
      const rawTxtST = r.text !== undefined ? r.text : p.text;
      el.textContent = cleanText(rawTxtST || '');
      break;
    }

    case 'slider': {
      el.classList.add('wt-slider');
      const color = r.color || p.color || [1,1,1,0.4];

      const arrLeft = document.createElement('span');
      arrLeft.className = 'sl-arr';
      arrLeft.innerHTML = '&#9664;';

      const track = document.createElement('div');
      track.className = 'sl-track';
      const fill = document.createElement('div');
      fill.className = 'sl-fill';
      const thumb = document.createElement('div');
      thumb.className = 'sl-thumb';
      track.appendChild(fill);
      track.appendChild(thumb);

      const arrRight = document.createElement('span');
      arrRight.className = 'sl-arr';
      arrRight.innerHTML = '&#9654;';

      el.appendChild(arrLeft);
      el.appendChild(track);
      el.appendChild(arrRight);
      break;
    }

    case 'ctrlgroup': {
      el.classList.add('wt-ctrlgroup');
      // Render name label in edit mode
      if (editMode) {
        const lbl = document.createElement('div');
        lbl.style.cssText = `font-family:'JetBrains Mono',monospace;font-size:${Math.max(6, fontPx*0.6)}px;color:rgba(100,100,200,.7);padding:2px;`;
        lbl.textContent = ctrl.name;
        el.appendChild(lbl);
      }
      break;
    }

    default: // rsctext
    case 'rsctext': {
      el.classList.add('wt-rsctext');

      const ct = r.colorText || p.colorText;
      const bg = r.colorBackground || p.colorBackground;

      if (Array.isArray(ct)) el.style.color = rgba(ct);
      if (Array.isArray(bg) && (bg[3] || 0) > 0.01) {
        el.style.background = rgba(bg);
      } else {
        el.style.background = 'transparent';
      }

      el.style.fontSize = Math.max(6, fontPx) + 'px';

      // Apply text shadow
      const shadow = r.shadow !== undefined ? r.shadow : 2;
      if (shadow === 2) {
        el.style.textShadow = '1px 1px 2px rgba(0,0,0,.9)';
      } else if (shadow === 1) {
        el.style.textShadow = '0 0 3px rgba(0,0,0,.9),-1px -1px 0 rgba(0,0,0,.6),1px 1px 0 rgba(0,0,0,.6)';
      }

      // In preview mode: only render the actual text content — never fall back
      // to ctrl.name (that would show "Background_M" etc. over decorative panels).
      // In edit mode: show the name as an overlay tag (added below) but still
      // use only real text for the control's own textContent.
      const rawTxt = r.text !== undefined ? r.text : p.text;
      const displayTxt = cleanText(rawTxt || '');
      el.textContent = displayTxt;
      break;
    }
  }

  // Edit-mode name overlay tag — shows ctrl.name as a small label in the top-left
  // corner so decorative controls (Background_M, IGUIBack, frames) are identifiable
  // in edit mode without polluting their text content in preview.
  if (editMode && ctrl.name) {
    const nameTag = document.createElement('div');
    nameTag.setAttribute('aria-hidden', 'true');
    nameTag.dataset.nametag = '1';
    nameTag.style.cssText = [
      'position:absolute',
      'top:1px',
      'left:1px',
      'font-family:"JetBrains Mono",monospace',
      `font-size:${Math.max(6, Math.min(10, fontPx * 0.55))}px`,
      'color:rgba(75,184,200,0.75)',
      'background:rgba(0,0,0,0.55)',
      'padding:0 2px',
      'border-radius:2px',
      'pointer-events:none',
      'z-index:2',
      'white-space:nowrap',
      'overflow:hidden',
      `max-width:${Math.max(20, geo.width * zoom - 4)}px`,
      'text-overflow:ellipsis',
      'line-height:1.4',
    ].join(';');
    nameTag.textContent = ctrl.name;
    el.appendChild(nameTag);
  }

  // Resize handle (edit mode)
  const rh = document.createElement('div');
  rh.className = 'rh';
  rh.dataset.resize = '1';
  rh.setAttribute('aria-hidden', 'true');
  el.appendChild(rh);

  // Events
  el.addEventListener('mousedown', (e) => onCtrlMouseDown(e, ctrl));
  el.title = ctrl.name + (ctrl.idc !== undefined && ctrl.idc >= 0 ? ' (idc ' + ctrl.idc + ')' : '')
    + (getMeta(ctrl).locked ? ' [LOCKED]' : '') + (getMeta(ctrl).hidden ? ' [HIDDEN]' : '');

  return el;
}

// ============================================================
// Render all
// ============================================================
function renderAll() {
  renderControls();
  renderLayers();
  renderInspector();
}

function renderControls() {
  const stage = document.getElementById('stage');
  // Clear
  stage.innerHTML = '';

  if (!displayData) return;

  const all = [...(displayData.background || []), ...(displayData.controls || [])];
  all.forEach((ctrl, i) => {
    const el = buildControlEl(ctrl, i + 1);
    stage.appendChild(el);
  });
}

// ============================================================
// Layer list
// ============================================================
function renderLayers() {
  const el = document.getElementById('layer-list');
  el.innerHTML = '';

  if (!displayData) return;

  function addSection(arr, label, isBg) {
    if (!arr || arr.length === 0) return;
    const hdr = document.createElement('div');
    hdr.className = 'layer-hdr';
    hdr.textContent = label;
    el.appendChild(hdr);

    arr.forEach(ctrl => {
      const meta = getMeta(ctrl);
      const isPrimary = ctrl === selectedCtrl;
      const isInSet = selectedSet.has(ctrl);
      let rowCls = 'layer-item';
      if (isPrimary) rowCls += ' selected';
      else if (isInSet) rowCls += ' multi-selected';
      if (isBg) rowCls += ' bg-ctrl';
      if (meta.locked) rowCls += ' locked';
      if (meta.hidden) rowCls += ' hidden-ctrl';

      const row = document.createElement('div');
      row.className = rowCls;
      row.setAttribute('role', 'listitem');
      row.setAttribute('tabindex', '0');

      const dot = document.createElement('span');
      dot.className = 'layer-dot';
      dot.style.background = getWClassColor(getWClass(ctrl));
      dot.setAttribute('aria-hidden', 'true');
      row.appendChild(dot);

      const name = document.createElement('span');
      name.className = 'layer-name';
      name.textContent = ctrl.name;
      name.title = ctrl.name;
      row.appendChild(name);

      const idc = document.createElement('span');
      idc.className = 'layer-idc';
      idc.textContent = ctrl.idc !== undefined && ctrl.idc >= 0 ? ctrl.idc : '';
      row.appendChild(idc);

      // Hide toggle
      const hideBtn = document.createElement('button');
      hideBtn.className = 'layer-action' + (meta.hidden ? ' active' : '');
      hideBtn.title = meta.hidden ? 'Show' : 'Hide';
      hideBtn.setAttribute('aria-label', (meta.hidden ? 'Show' : 'Hide') + ' ' + ctrl.name);
      hideBtn.textContent = meta.hidden ? '○' : '●';
      hideBtn.addEventListener('click', e => {
        e.stopPropagation();
        meta.hidden = !meta.hidden;
        renderAll();
      });
      row.appendChild(hideBtn);

      // Lock toggle
      const lockBtn = document.createElement('button');
      lockBtn.className = 'layer-action' + (meta.locked ? ' active' : '');
      lockBtn.title = meta.locked ? 'Unlock' : 'Lock';
      lockBtn.setAttribute('aria-label', (meta.locked ? 'Unlock' : 'Lock') + ' ' + ctrl.name);
      lockBtn.textContent = meta.locked ? '🔒' : '🔓';
      lockBtn.style.fontSize = '9px';
      lockBtn.addEventListener('click', e => {
        e.stopPropagation();
        meta.locked = !meta.locked;
        renderAll();
      });
      row.appendChild(lockBtn);

      row.addEventListener('click', e => {
        if (e.target === hideBtn || e.target === lockBtn) return;
        if (e.shiftKey || e.ctrlKey || e.metaKey) {
          // Add/remove from multi-select
          if (selectedSet.has(ctrl)) {
            selectedSet.delete(ctrl);
            if (ctrl === selectedCtrl) {
              selectedCtrl = selectedSet.size ? [...selectedSet][0] : null;
            }
          } else {
            selectedSet.add(ctrl);
            selectedCtrl = ctrl;
          }
          renderControls();
          renderLayers();
          renderInspector();
        } else {
          selectCtrl(ctrl);
        }
      });
      row.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' || ev.key === ' ') { selectCtrl(ctrl); ev.preventDefault(); }
      });
      el.appendChild(row);
    });
  }

  addSection(displayData.background, 'controlsBackground', true);
  addSection(displayData.controls, 'controls', false);
}

function getWClassColor(wclass) {
  const map = {
    'shortcutbuttonmain': '#42b6ff',
    'shortcutbutton': '#8a9266',
    'button-main': '#2a80cc',
    'button': '#5c6536',
    'button-exit': '#802020',
    'iguiback': '#39414b',
    'rscframe': '#666',
    'mapcontrol': '#406030',
    'listbox': '#884488',
    'combo': '#b88820',
    'edit': '#804040',
    'picture': '#6a9040',
    'structuredtext': '#7a7020',
    'slider': '#609060',
    'ctrlgroup': '#4444aa',
    'rsctext': '#6a6050',
  };
  return map[wclass] || '#39414b';
}

// ============================================================
// Inspector — full editable property inspector
// ============================================================

// HUD displays use SafeZone string expressions for geometry
function isHudDisplay() {
  return displayData && displayData.posSystem === 'safezone';
}

// Retrieve the inherited value of a prop from the baseClass chain (not from ctrl.props)
function inheritedVal(ctrl, key) {
  if (!uiData) return undefined;
  let base = ctrl.baseClass || ctrl.rscBase;
  const visited = new Set();
  while (base && !visited.has(base)) {
    visited.add(base);
    const bc = uiData.baseClasses && uiData.baseClasses[base];
    if (!bc) break;
    if (bc.props && key in bc.props) return bc.props[key];
    base = bc.parent;
  }
  return undefined;
}

// Check if a prop is overridden (present in ctrl.props)
function isPropOverride(ctrl, key) {
  return ctrl.props && key in ctrl.props;
}

// Get effective value: override → resolved → inherited
function effectiveVal(ctrl, key) {
  const p = ctrl.props || {};
  const r = ctrl.resolved || {};
  if (key in p) return p[key];
  if (key in r) return r[key];
  return inheritedVal(ctrl, key);
}

// Convert RGBA array [r,g,b,a] → hex #rrggbb (for color input)
function rgbaToHex(arr) {
  if (!Array.isArray(arr) || arr.length < 3) return '#000000';
  const r = Math.round(Math.min(1, Math.max(0, arr[0])) * 255);
  const g = Math.round(Math.min(1, Math.max(0, arr[1])) * 255);
  const b = Math.round(Math.min(1, Math.max(0, arr[2])) * 255);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// Convert hex #rrggbb + alpha 0..1 → RGBA array
function hexAlphaToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [parseFloat(r.toFixed(4)), parseFloat(g.toFixed(4)), parseFloat(b.toFixed(4)), parseFloat(alpha.toFixed(4))];
}

// Get macro name for an RGBA array (or null if not a macro match)
function macroForRgba(arr) {
  if (!uiData || !arr) return null;
  for (const [name, val] of Object.entries(uiData.macros || {})) {
    if (Array.isArray(val) && val.length === arr.length) {
      if (val.every((v, i) => Math.abs(v - arr[i]) < 0.001)) return name;
    }
  }
  return null;
}

// Style flag bit definitions (Arma 2 control style constants)
const STYLE_FLAGS = [
  { bit: 0x01, label: 'ST_MULTI' },
  { bit: 0x02, label: 'ST_CENTER' },
  { bit: 0x04, label: 'ST_RIGHT' },
  { bit: 0x06, label: 'ST_LEFT (def)' },
  { bit: 0x10, label: 'ST_TITLE_BAR' },
  { bit: 0x20, label: 'ST_PICTURE' },
  { bit: 0x40, label: 'ST_FRAME' },
  { bit: 0x80, label: 'ST_BACKGROUND' },
  { bit: 0x100, label: 'ST_GROUP_BOX' },
  { bit: 0x200, label: 'ST_UPPER' },
  { bit: 0x400, label: 'ST_GROUP_BOX2' },
  { bit: 0x800, label: 'ST_HUD_BACKGROUND' },
  { bit: 0x1000, label: 'ST_TILE_PICTURE' },
  { bit: 0x2000, label: 'ST_WITH_RECT' },
  { bit: 0x4000, label: 'ST_LINE' },
];

// Parse style value (can be "0x02 + 0x100", "0x02", "2", etc.) → integer
function parseStyle(val) {
  if (val === null || val === undefined) return 0;
  if (typeof val === 'number') return val;
  const str = String(val).replace(/\s+/g,'');
  // Evaluate addition of hex/decimal literals
  try {
    return str.split('+').reduce((sum, part) => {
      const t = part.trim();
      return sum + (t.startsWith('0x') || t.startsWith('0X') ? parseInt(t,16) : parseInt(t,10)||0);
    }, 0);
  } catch(e) { return 0; }
}

// Convert integer style → "0x02 + 0x100" string (skip 0)
function formatStyle(bits) {
  if (!bits) return '0';
  const parts = STYLE_FLAGS.filter(f => (bits & f.bit) === f.bit && f.bit !== 0x06)
    .map(f => '0x' + f.bit.toString(16).toUpperCase());
  // Also check left-align non-flags
  return parts.length ? parts.join(' + ') : String(bits);
}

// Known font names from Arma 2
const KNOWN_FONTS = [
  'Zeppelin32', 'Zeppelin35', 'EtelkaNarrowMediumPro',
  'PuristaMedium', 'LucidaConsoleB', 'TahomaB', 'Bitstream',
  'RobotoCondensed', 'puristaMedium', 'lucidaConsoleB'
];

// Color prop keys
const COLOR_KEYS = new Set([
  'colorText','colorBackground','colorBackgroundActive','colorFocused',
  'colorShadow','colorBorder','colorDisabled','colorBackgroundDisabled',
  'colorSelectBackground','color','color2','colorBackground2','colorSelect',
  'colorActive','colorOutside','colorPictureFocused',
]);

// Geo keys (skip from props section — shown in Geometry section)
const GEO_KEYS = new Set(['x','y','w','h']);

// Keys to skip entirely in inspector (internal / texture arrays / sound arrays)
const SKIP_KEYS = new Set([
  'type','type_name','idc',
  'animTextureNormal','animTextureDisabled','animTextureOver','animTextureFocused',
  'animTexturePressed','animTextureDefault','textureNoShortcut',
  'soundEnter','soundPush','soundClick','soundEscape',
  'soundSelect','soundExpand','soundCollapse','soundDoubleClick',
  'period','periodFocus','periodOver','default',
  'columns','maxHistoryDelay','autoScrollSpeed','autoScrollDelay','autoScrollRewind',
  'offsetX','offsetY','offsetPressedX','offsetPressedY',
  'borderSize','colorShadow','colorBorder',
]);

// State: geo mode per axis ('num' or 'expr') — persists across inspector refreshes
const geoMode = { x:'num', y:'num', w:'num', h:'num' };

// Track which control is currently inspected to avoid full rebuilds during drags
let _inspectedCtrl = null;

function renderInspector() {
  const ctrl = selectedCtrl;
  const multiCount = selectedSet.size;
  const placeholder = document.getElementById('inspector-placeholder');
  const insp = document.getElementById('inspector');

  if (!ctrl) {
    placeholder.style.display = '';
    insp.style.display = 'none';
    _inspectedCtrl = null;
    return;
  }

  placeholder.style.display = 'none';
  insp.style.display = '';

  // Rebuild the inspector DOM completely (it's cheap enough; avoids stale listeners)
  insp.innerHTML = '';
  _inspectedCtrl = ctrl;

  const isMulti = multiCount > 1;

  // Helper: create a labelled field row
  function makeRow(key, labelText, inputEl, isOverride, inheritVal) {
    const row = document.createElement('div');
    row.className = 'field-row';

    const lbl = document.createElement('label');

    const lblText = document.createElement('span');
    lblText.className = 'lbl-text';
    lblText.textContent = labelText;
    lbl.appendChild(lblText);

    if (isOverride) {
      const badge = document.createElement('span');
      badge.className = 'override-badge';
      badge.title = 'This prop overrides the inherited value';
      badge.textContent = 'override';
      lbl.appendChild(badge);

      if (key && !isMulti) {
        const resetBtn = document.createElement('button');
        resetBtn.className = 'reset-btn';
        resetBtn.title = 'Reset to inherited';
        resetBtn.textContent = '↺';
        resetBtn.addEventListener('click', () => {
          if (ctrl.props) delete ctrl.props[key];
          // Also sync resolved
          const inh = inheritedVal(ctrl, key);
          if (ctrl.resolved && inh !== undefined) ctrl.resolved[key] = inh;
          else if (ctrl.resolved) delete ctrl.resolved[key];
          renderAll();
        });
        lbl.appendChild(resetBtn);
      }
    }

    row.appendChild(lbl);
    row.appendChild(inputEl);

    if (inheritVal !== undefined && !isOverride) {
      const hint = document.createElement('div');
      hint.className = 'inherited-hint';
      hint.textContent = 'inherited: ' + fmtVal(inheritVal);
      row.appendChild(hint);
    }

    return row;
  }

  // Apply a prop change to the selected control(s)
  function applyProp(key, value) {
    pushUndo();
    const targets = isMulti ? [...selectedSet] : [ctrl];
    for (const c of targets) {
      if (!c.props) c.props = {};
      c.props[key] = value;
      if (c.resolved) c.resolved[key] = value;
    }
    renderControls();
    // Don't re-render inspector to avoid losing focus; just update override styling
    updateOverrideStyling(key);
  }

  function updateOverrideStyling(key) {
    // Update input override class without full re-render
    const el = insp.querySelector('[data-prop="' + key + '"]');
    if (el) {
      const over = isPropOverride(ctrl, key);
      el.classList.toggle('is-override', over);
    }
  }

  // ---- Section: Identity ----
  const secIdentity = document.createElement('h3');
  secIdentity.textContent = isMulti ? 'Multi-select (' + multiCount + ')' : 'Identity';
  insp.appendChild(secIdentity);

  if (isMulti) {
    const banner = document.createElement('div');
    banner.className = 'multi-insp-banner';
    const names = [...selectedSet].map(c => c.name);
    banner.textContent = names.slice(0, 5).join(', ') + (names.length > 5 ? ' +' + (names.length-5) + ' more' : '');
    insp.appendChild(banner);
  }

  // Name field (single only)
  if (!isMulti) {
    const nameIn = document.createElement('input');
    nameIn.type = 'text';
    nameIn.value = ctrl.name || '';
    nameIn.dataset.prop = '_name';
    nameIn.addEventListener('change', () => {
      const newName = nameIn.value.trim();
      if (newName && newName !== ctrl.name) {
        pushUndo();
        ctrl.name = newName;
        renderAll();
      }
    });
    insp.appendChild(makeRow('_name', 'Name', nameIn, false));

    // IDC
    const idcIn = document.createElement('input');
    idcIn.type = 'number';
    idcIn.value = ctrl.idc !== undefined ? ctrl.idc : -2;
    idcIn.dataset.prop = '_idc';
    idcIn.addEventListener('change', () => {
      const v = parseInt(idcIn.value);
      if (!isNaN(v)) {
        pushUndo();
        ctrl.idc = v;
        renderLayers();
      }
    });
    insp.appendChild(makeRow('_idc', 'IDC', idcIn, false));
  }

  // BaseClass dropdown (single only)
  if (!isMulti) {
    const baseIn = document.createElement('select');
    baseIn.dataset.prop = '_baseClass';
    const baseClasses = Object.keys(uiData && uiData.baseClasses || {});
    const common = ['RscText','RscButton','RscButton_Main','RscButton_Exit',
      'RscShortcutButton','RscShortcutButtonMain','RscListBox','RscListnBox',
      'RscCombo','RscEdit','RscStructuredText','RscPicture','RscFrame',
      'IGUIBack','RscMapControl','RscXSliderH','RscControlsGroup','RscClickableText'];
    const allBases = [...new Set([...common, ...baseClasses])].sort();
    // Add current value even if not in the list
    const curBase = ctrl.baseClass || ctrl.rscBase || '';
    if (curBase && !allBases.includes(curBase)) allBases.unshift(curBase);
    allBases.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      if (name === curBase) opt.selected = true;
      baseIn.appendChild(opt);
    });
    baseIn.addEventListener('change', () => {
      pushUndo();
      ctrl.baseClass = baseIn.value;
      // Re-resolve inherited props from new base
      if (uiData && uiData.baseClasses && uiData.baseClasses[baseIn.value]) {
        const newResolved = Object.assign({}, uiData.baseClasses[baseIn.value].props || {});
        // Merge existing prop overrides on top
        ctrl.resolved = Object.assign(newResolved, ctrl.props || {});
      }
      renderAll();
    });
    insp.appendChild(makeRow('_baseClass', 'Base Class', baseIn, false));
  }

  // ---- Section: Geometry ----
  const secGeo = document.createElement('h3');
  secGeo.textContent = 'Geometry';
  insp.appendChild(secGeo);

  const isHUD = isHudDisplay();

  // Toggle row for HUD
  if (isHUD) {
    const toggleRow = document.createElement('div');
    toggleRow.className = 'geo-toggle';
    toggleRow.innerHTML = '<span>Input mode:</span>';
    ['x','y','w','h'].forEach(axis => {
      const btn = document.createElement('button');
      btn.textContent = axis + ':' + (geoMode[axis] === 'expr' ? 'expr' : 'num');
      btn.className = geoMode[axis] === 'expr' ? 'active' : '';
      btn.title = 'Toggle ' + axis + ' between numeric and SafeZone expression';
      btn.addEventListener('click', () => {
        geoMode[axis] = geoMode[axis] === 'expr' ? 'num' : 'expr';
        renderInspector(); // rebuild with new mode
      });
      toggleRow.appendChild(btn);
    });
    insp.appendChild(toggleRow);
  }

  const geoGrid = document.createElement('div');
  geoGrid.className = 'grid-2';
  insp.appendChild(geoGrid);

  ['x','y','w','h'].forEach(axis => {
    const rawVal = effectiveVal(ctrl, axis);
    const isOver = isPropOverride(ctrl, axis);
    const inh = inheritedVal(ctrl, axis);

    const useExpr = isHUD && geoMode[axis] === 'expr';
    const inp = document.createElement('input');
    inp.dataset.prop = axis;
    inp.type = useExpr ? 'text' : 'number';
    if (useExpr) {
      inp.value = (ctrl.props && axis in ctrl.props) ? String(ctrl.props[axis])
        : (rawVal !== undefined ? String(rawVal) : '');
    } else {
      const numVal = isHUD ? evalSZ(rawVal) : (parseFloat(rawVal) || 0);
      inp.value = parseFloat(numVal.toFixed(6));
      inp.step = '0.001';
    }
    if (isOver) inp.classList.add('is-override');

    inp.addEventListener('change', () => {
      const v = useExpr ? inp.value.trim() : parseFloat(inp.value);
      if (!useExpr && isNaN(v)) return;
      applyProp(axis, v);
    });

    const wrapper = document.createElement('div');
    wrapper.appendChild(makeRow(axis, axis.toUpperCase(), inp, isOver, isOver ? inh : undefined));
    geoGrid.appendChild(wrapper);
  });

  // ---- Section: Text / Label ----
  const secText = document.createElement('h3');
  secText.textContent = 'Text';
  insp.appendChild(secText);

  // Get common text value for multi-select
  const multiTextVal = isMulti
    ? ([...selectedSet].map(c => effectiveVal(c,'text')).every((v,_,a) => v===a[0]) ? effectiveVal(ctrl,'text') : '(mixed)')
    : effectiveVal(ctrl,'text');

  const textIn = document.createElement('input');
  textIn.type = 'text';
  textIn.value = typeof multiTextVal === 'string' ? multiTextVal : '';
  textIn.placeholder = isMulti && multiTextVal === '(mixed)' ? '(mixed)' : '(none)';
  textIn.dataset.prop = 'text';
  if (isPropOverride(ctrl, 'text')) textIn.classList.add('is-override');
  textIn.addEventListener('change', () => {
    applyProp('text', textIn.value);
    renderControls();
  });
  insp.appendChild(makeRow('text', 'Text', textIn, isPropOverride(ctrl, 'text'), inheritedVal(ctrl,'text')));

  // Tooltip
  const tooltipIn = document.createElement('input');
  tooltipIn.type = 'text';
  tooltipIn.value = effectiveVal(ctrl, 'tooltip') || '';
  tooltipIn.dataset.prop = 'tooltip';
  if (isPropOverride(ctrl, 'tooltip')) tooltipIn.classList.add('is-override');
  tooltipIn.addEventListener('change', () => applyProp('tooltip', tooltipIn.value));
  insp.appendChild(makeRow('tooltip', 'Tooltip', tooltipIn, isPropOverride(ctrl,'tooltip'), inheritedVal(ctrl,'tooltip')));

  // ---- Section: Appearance ----
  const secAppear = document.createElement('h3');
  secAppear.textContent = 'Appearance';
  insp.appendChild(secAppear);

  // Font
  const fontIn = document.createElement('select');
  fontIn.dataset.prop = 'font';
  const fontVal = effectiveVal(ctrl, 'font') || 'Zeppelin32';
  const allFonts = [...new Set([...KNOWN_FONTS, fontVal])];
  allFonts.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    if (f === fontVal) opt.selected = true;
    fontIn.appendChild(opt);
  });
  if (isPropOverride(ctrl, 'font')) fontIn.classList.add('is-override');
  fontIn.addEventListener('change', () => applyProp('font', fontIn.value));
  insp.appendChild(makeRow('font', 'Font', fontIn, isPropOverride(ctrl,'font'), inheritedVal(ctrl,'font')));

  // sizeEx
  const sizeIn = document.createElement('input');
  sizeIn.type = 'number';
  sizeIn.step = '0.001';
  sizeIn.value = parseFloat((effectiveVal(ctrl,'sizeEx') || 0.03).toFixed(5));
  sizeIn.dataset.prop = 'sizeEx';
  if (isPropOverride(ctrl, 'sizeEx')) sizeIn.classList.add('is-override');
  sizeIn.addEventListener('change', () => applyProp('sizeEx', parseFloat(sizeIn.value)));
  insp.appendChild(makeRow('sizeEx', 'sizeEx', sizeIn, isPropOverride(ctrl,'sizeEx'), inheritedVal(ctrl,'sizeEx')));

  // Shadow
  const shadowIn = document.createElement('select');
  shadowIn.dataset.prop = 'shadow';
  [[0,'0 — none'],[1,'1 — outline'],[2,'2 — drop']].forEach(([v,l]) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = l;
    const sv = effectiveVal(ctrl,'shadow');
    if (sv !== undefined && parseInt(sv) === v) opt.selected = true;
    shadowIn.appendChild(opt);
  });
  if (isPropOverride(ctrl, 'shadow')) shadowIn.classList.add('is-override');
  shadowIn.addEventListener('change', () => applyProp('shadow', parseInt(shadowIn.value)));
  insp.appendChild(makeRow('shadow', 'Shadow', shadowIn, isPropOverride(ctrl,'shadow'), inheritedVal(ctrl,'shadow')));

  // Style (flag checkboxes)
  const styleVal = parseStyle(effectiveVal(ctrl, 'style'));
  const styleIsOver = isPropOverride(ctrl, 'style');
  const styleRow = document.createElement('div');
  styleRow.className = 'field-row';
  const styleLbl = document.createElement('label');
  const styleLblText = document.createElement('span');
  styleLblText.className = 'lbl-text';
  styleLblText.textContent = 'Style';
  styleLbl.appendChild(styleLblText);
  if (styleIsOver) {
    const badge = document.createElement('span');
    badge.className = 'override-badge';
    badge.textContent = 'override';
    styleLbl.appendChild(badge);
    if (!isMulti) {
      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset-btn';
      resetBtn.textContent = '↺';
      resetBtn.addEventListener('click', () => {
        if (ctrl.props) delete ctrl.props.style;
        const inh = inheritedVal(ctrl, 'style');
        if (ctrl.resolved && inh !== undefined) ctrl.resolved.style = inh;
        else if (ctrl.resolved) delete ctrl.resolved.style;
        renderAll();
      });
      styleLbl.appendChild(resetBtn);
    }
  }
  styleRow.appendChild(styleLbl);
  const flagsWrap = document.createElement('div');
  flagsWrap.className = 'style-flags';
  STYLE_FLAGS.slice(0, 8).forEach(({ bit, label }) => {
    const flagEl = document.createElement('label');
    flagEl.className = 'style-flag';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.checked = (styleVal & bit) !== 0;
    chk.addEventListener('change', () => {
      let cur = parseStyle(effectiveVal(ctrl, 'style'));
      if (chk.checked) cur |= bit; else cur &= ~bit;
      applyProp('style', cur ? formatStyle(cur) : '0');
    });
    flagEl.appendChild(chk);
    flagEl.appendChild(document.createTextNode(label));
    flagsWrap.appendChild(flagEl);
  });
  styleRow.appendChild(flagsWrap);
  insp.appendChild(styleRow);

  // ---- Section: Colors ----
  const secColors = document.createElement('h3');
  secColors.textContent = 'Colors';
  insp.appendChild(secColors);

  const colorPropList = [
    'colorBackground','colorText','colorFocused','color',
    'colorBackgroundActive','colorDisabled','colorBackgroundDisabled','colorSelect',
  ];

  // Collect which color props are actually relevant (present in resolved or props)
  const relevantColors = colorPropList.filter(k => {
    const v = effectiveVal(ctrl, k);
    return Array.isArray(v);
  });
  // Always show at least the core 3
  const coreColors = ['colorBackground','colorText','colorFocused','color'];
  const showColors = [...new Set([...coreColors, ...relevantColors])];

  showColors.forEach(key => {
    const curVal = effectiveVal(ctrl, key);
    const isOver = isPropOverride(ctrl, key);
    const inh = inheritedVal(ctrl, key);
    const arr = Array.isArray(curVal) ? curVal : [0,0,0,1];

    const colorRow = document.createElement('div');
    colorRow.className = 'color-row';

    // Color picker
    const colorPick = document.createElement('input');
    colorPick.type = 'color';
    colorPick.value = rgbaToHex(arr);
    colorPick.title = 'Pick color';

    // Alpha input
    const alphaIn = document.createElement('input');
    alphaIn.type = 'number';
    alphaIn.className = 'alpha-in';
    alphaIn.min = '0'; alphaIn.max = '1'; alphaIn.step = '0.01';
    alphaIn.value = parseFloat((arr[3] !== undefined ? arr[3] : 1).toFixed(3));
    alphaIn.title = 'Alpha (0–1)';
    alphaIn.style.cssText = 'width:50px;padding:2px 4px;font-size:9px';

    // Macro dropdown
    const macroSel = document.createElement('select');
    macroSel.className = 'macro-sel';
    macroSel.style.fontSize = '9px';
    const noMacroOpt = document.createElement('option');
    noMacroOpt.value = ''; noMacroOpt.textContent = '— macro —';
    macroSel.appendChild(noMacroOpt);
    const curMacro = macroForRgba(arr);
    Object.entries(uiData && uiData.macros || {}).forEach(([name, val]) => {
      if (!Array.isArray(val)) return;
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      if (name === curMacro) opt.selected = true;
      macroSel.appendChild(opt);
    });

    // Swatch
    const swatch = document.createElement('span');
    swatch.className = 'color-swatch-lg';
    swatch.style.background = rgba(arr);

    function refreshSwatch(newArr) {
      swatch.style.background = rgba(newArr);
      colorPick.value = rgbaToHex(newArr);
      alphaIn.value = parseFloat((newArr[3] !== undefined ? newArr[3] : 1).toFixed(3));
      // Update macro dropdown
      const nm = macroForRgba(newArr);
      macroSel.value = nm || '';
    }

    colorPick.addEventListener('input', () => {
      const newArr = hexAlphaToRgba(colorPick.value, parseFloat(alphaIn.value)||1);
      applyProp(key, newArr);
      refreshSwatch(newArr);
      macroSel.value = macroForRgba(newArr) || '';
    });

    alphaIn.addEventListener('change', () => {
      const newArr = hexAlphaToRgba(colorPick.value, Math.max(0, Math.min(1, parseFloat(alphaIn.value)||1)));
      applyProp(key, newArr);
      refreshSwatch(newArr);
    });

    macroSel.addEventListener('change', () => {
      if (!macroSel.value) return;
      const macroVal = uiData.macros[macroSel.value];
      if (Array.isArray(macroVal)) {
        applyProp(key, macroVal);
        refreshSwatch(macroVal);
      }
    });

    colorRow.appendChild(swatch);
    colorRow.appendChild(colorPick);
    colorRow.appendChild(alphaIn);
    colorRow.appendChild(macroSel);

    insp.appendChild(makeRow(key, key, colorRow, isOver, isOver ? inh : undefined));
  });

  // ---- Section: Events / Actions ----
  const secEvents = document.createElement('h3');
  secEvents.textContent = 'Events';
  insp.appendChild(secEvents);

  const eventKeys = ['action','onButtonClick','onLBSelChanged','onLBDblClick','onMouseButtonClick'];
  eventKeys.forEach(key => {
    const curVal = effectiveVal(ctrl, key);
    if (curVal === undefined && !isPropOverride(ctrl, key)) {
      // Only show if it's a common key or already has a value
      const commonEvents = ['action','onButtonClick','onLBSelChanged'];
      if (!commonEvents.includes(key)) return;
    }
    const eventIn = document.createElement('textarea');
    eventIn.rows = 2;
    eventIn.style.cssText = 'font-size:9px;resize:vertical;min-height:36px';
    eventIn.value = (curVal !== undefined && curVal !== null) ? String(curVal) : '';
    eventIn.placeholder = '(none)';
    eventIn.dataset.prop = key;
    if (isPropOverride(ctrl, key)) eventIn.classList.add('is-override');
    eventIn.addEventListener('change', () => {
      const v = eventIn.value.trim();
      if (v) applyProp(key, v);
      else {
        // Remove override if empty
        if (ctrl.props) delete ctrl.props[key];
        if (ctrl.resolved) delete ctrl.resolved[key];
        renderControls();
      }
    });
    insp.appendChild(makeRow(key, key, eventIn, isPropOverride(ctrl, key), inheritedVal(ctrl, key)));
  });
}

function fmtVal(v) {
  if (v === null || v === undefined) return '—';
  if (Array.isArray(v)) {
    if (v.length <= 4 && v.every(x => typeof x === 'number')) {
      return '[' + v.map(x => parseFloat(x.toFixed(3))).join(', ') + ']';
    }
    return '[…]';
  }
  if (typeof v === 'number') return parseFloat(v.toFixed(6)).toString();
  return String(v);
}

// ============================================================
// Selection
// ============================================================
function selectCtrl(ctrl) {
  selectedCtrl = ctrl;
  selectedSet.clear();
  if (ctrl) selectedSet.add(ctrl);
  renderControls();
  renderLayers();
  renderInspector();
}

function selectMulti(ctrls) {
  selectedSet = new Set(ctrls);
  selectedCtrl = ctrls.length ? ctrls[ctrls.length - 1] : null;
  renderControls();
  renderLayers();
  renderInspector();
}

// Get bounding box (in fractional coords) of the current selection
function selectionBounds() {
  const ctrls = [...selectedSet];
  if (!ctrls.length) return null;
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of ctrls) {
    const xf = resolveGeo(c, 'x', posSystem);
    const yf = resolveGeo(c, 'y', posSystem);
    const wf = resolveGeo(c, 'w', posSystem);
    const hf = resolveGeo(c, 'h', posSystem);
    minX = Math.min(minX, xf);
    minY = Math.min(minY, yf);
    maxX = Math.max(maxX, xf + wf);
    maxY = Math.max(maxY, yf + hf);
  }
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

// Click on empty stage — start marquee or deselect
document.getElementById('stage').addEventListener('mousedown', e => {
  if (e.target !== document.getElementById('stage') &&
      e.target !== document.getElementById('marquee')) return;
  if (!editMode) { selectCtrl(null); return; }

  // Start marquee
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / zoom;
  const sy = (e.clientY - rect.top) / zoom;
  marqueeState = { startX: sx, startY: sy };
  const mq = document.getElementById('marquee');
  mq.style.display = 'block';
  mq.style.left = sx + 'px';
  mq.style.top = sy + 'px';
  mq.style.width = '0px';
  mq.style.height = '0px';

  if (!e.shiftKey && !e.ctrlKey && !e.metaKey) {
    selectCtrl(null);
  }
  e.preventDefault();
});

// ============================================================
// Drag + Resize (edit mode only)
// ============================================================
function onCtrlMouseDown(e, ctrl) {
  if (!editMode) { selectCtrl(ctrl); return; }

  const meta = getMeta(ctrl);
  if (meta.locked) return; // locked — don't start drag

  // Alt-click: cycle through overlapping controls at this point
  if (e.altKey) {
    e.stopPropagation();
    e.preventDefault();
    altCycleAt(e);
    return;
  }

  // Shift/Ctrl: add/toggle in multi-select
  if (e.shiftKey || e.ctrlKey || e.metaKey) {
    e.stopPropagation();
    if (selectedSet.has(ctrl)) {
      selectedSet.delete(ctrl);
      if (ctrl === selectedCtrl) selectedCtrl = selectedSet.size ? [...selectedSet][selectedSet.size-1] : null;
    } else {
      selectedSet.add(ctrl);
      selectedCtrl = ctrl;
    }
    renderControls();
    renderLayers();
    renderInspector();
    return;
  }

  // If clicking a control not in the current selection, select it (respecting groups)
  if (!selectedSet.has(ctrl)) maybeSelectGroup(ctrl);

  const isResize = e.target.dataset.resize === '1';
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';

  const getF = (c, key) => {
    const r = c.resolved || c.props || {};
    const p = c.props || {};
    const raw = r[key] !== undefined ? r[key] : p[key];
    return posSystem === 'safezone' ? evalSZ(raw) : parseFloat(raw) || 0;
  };

  // Capture starting positions of ALL selected controls
  const startPositions = [...selectedSet].map(c => ({
    ctrl: c,
    x: getF(c, 'x'), y: getF(c, 'y'),
    w: getF(c, 'w'), h: getF(c, 'h'),
  }));

  dragging = {
    ctrl, isResize,
    startMx: e.clientX, startMy: e.clientY,
    startPositions,
    posSystem,
    moved: false,
  };

  e.stopPropagation();
  e.preventDefault();
}

// Alt-click: cycle overlapping controls
function altCycleAt(e) {
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const px = (e.clientX - rect.left) / zoom;
  const py = (e.clientY - rect.top) / zoom;

  // Find all controls whose pixel rect contains this point
  const hits = allCtrls().filter(c => {
    if (getMeta(c).hidden) return false;
    const g = ctrlPx(c);
    return px >= g.left && px <= g.left + g.width && py >= g.top && py <= g.top + g.height;
  });
  if (!hits.length) { selectCtrl(null); return; }

  // If same hit set as last cycle, advance; else start fresh
  const key = hits.map(c => c.name).join('|');
  if (altCycleStack.join('|') !== key) {
    altCycleStack = hits.map(c => c.name);
    // Start from the currently selected one if it's in hits
    const curIdx = hits.indexOf(selectedCtrl);
    altCyclePos = curIdx >= 0 ? (curIdx + 1) % hits.length : 0;
  } else {
    altCyclePos = (altCyclePos + 1) % hits.length;
  }
  selectCtrl(hits[altCyclePos]);
}

// Clear snap guides
function clearGuides() {
  snapGuides.forEach(g => g.remove());
  snapGuides = [];
}

// Draw a snap guide line on the stage
function addGuide(isHoriz, fracPos) {
  const stage = document.getElementById('stage');
  const g = document.createElement('div');
  g.className = 'snap-guide ' + (isHoriz ? 'h' : 'v');
  if (isHoriz) {
    g.style.top = (fracPos * STAGE_H * zoom) + 'px';
  } else {
    g.style.left = (fracPos * STAGE_W * zoom) + 'px';
  }
  stage.appendChild(g);
  snapGuides.push(g);
}

// Smart snap: returns snapped value and optionally adds guides
function smartSnap(v, dim, isX, movingCtrls) {
  const snapEnabled = document.getElementById('snap-chk').checked;
  const gridStep = parseFloat(document.getElementById('snap-size').value) || 0.01;
  const THRESHOLD = 0.008; // fraction units

  let best = v;
  let bestDist = Infinity;
  let guidePos = null;

  if (snapEnabled) {
    // Grid snap
    const gridSnapped = Math.round(v / gridStep) * gridStep;
    const dist = Math.abs(v - gridSnapped);
    if (dist < bestDist) { best = gridSnapped; bestDist = dist; guidePos = null; }
  }

  // Snap to other controls' edges and centers
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';
  const others = allCtrls().filter(c => !movingCtrls.has(c) && !getMeta(c).hidden);
  for (const o of others) {
    const ox = resolveGeo(o, 'x', posSystem);
    const oy = resolveGeo(o, 'y', posSystem);
    const ow = resolveGeo(o, 'w', posSystem);
    const oh = resolveGeo(o, 'h', posSystem);
    const candidates = isX
      ? [ox, ox + ow, ox + ow / 2]
      : [oy, oy + oh, oy + oh / 2];
    for (const c of candidates) {
      const dist = Math.abs(v - c);
      if (dist < THRESHOLD && dist < bestDist) {
        bestDist = dist;
        best = c;
        guidePos = { isHoriz: !isX, pos: c };
      }
    }
  }

  return { val: best, guide: guidePos };
}

document.addEventListener('mousemove', e => {
  // Update cursor readout
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / zoom;
  const my = (e.clientY - rect.top) / zoom;
  const fxc = (mx / STAGE_W).toFixed(3);
  const fyc = (my / STAGE_H).toFixed(3);
  document.getElementById('cursor-pos').textContent = 'x:' + fxc + ' y:' + fyc;

  // Marquee update
  if (marqueeState && editMode) {
    const sx = marqueeState.startX;
    const sy = marqueeState.startY;
    const ex = mx, ey = my;
    const left = Math.min(sx, ex), top = Math.min(sy, ey);
    const w = Math.abs(ex - sx), h = Math.abs(ey - sy);
    const mq = document.getElementById('marquee');
    mq.style.left = (left * zoom) + 'px';
    mq.style.top = (top * zoom) + 'px';
    mq.style.width = (w * zoom) + 'px';
    mq.style.height = (h * zoom) + 'px';
    return;
  }

  if (!dragging || !editMode) return;

  dragging.moved = true;
  const dx = (e.clientX - dragging.startMx) / (STAGE_W * zoom);
  const dy = (e.clientY - dragging.startMy) / (STAGE_H * zoom);
  const movingSet = new Set(dragging.startPositions.map(s => s.ctrl));

  clearGuides();

  if (dragging.isResize) {
    // Resize primary only
    const sp = dragging.startPositions.find(s => s.ctrl === dragging.ctrl);
    if (sp) {
      const newW = Math.max(0.005, sp.w + dx);
      const newH = Math.max(0.002, sp.h + dy);
      const snapW = smartSnap(newW, STAGE_W, true, movingSet);
      const snapH = smartSnap(newH, STAGE_H, false, movingSet);
      sp.ctrl.props.w = snapW.val;
      sp.ctrl.props.h = snapH.val;
      if (sp.ctrl.resolved) { sp.ctrl.resolved.w = snapW.val; sp.ctrl.resolved.h = snapH.val; }
      if (snapW.guide) addGuide(snapW.guide.isHoriz, snapW.guide.pos);
      if (snapH.guide) addGuide(snapH.guide.isHoriz, snapH.guide.pos);
    }
  } else {
    // Move all selected
    for (const sp of dragging.startPositions) {
      const newX = Math.max(0, sp.x + dx);
      const newY = Math.max(0, sp.y + dy);
      const snapX = smartSnap(newX, STAGE_W, true, movingSet);
      const snapY = smartSnap(newY, STAGE_H, false, movingSet);
      sp.ctrl.props.x = snapX.val;
      sp.ctrl.props.y = snapY.val;
      if (sp.ctrl.resolved) { sp.ctrl.resolved.x = snapX.val; sp.ctrl.resolved.y = snapY.val; }
      // Only show guides for primary
      if (sp.ctrl === dragging.ctrl) {
        if (snapX.guide) addGuide(snapX.guide.isHoriz, snapX.guide.pos);
        if (snapY.guide) addGuide(snapY.guide.isHoriz, snapY.guide.pos);
      }
    }
  }

  renderControls();
  const p = dragging.ctrl.props;
  const rinsp = el => document.getElementById(el);
  if (rinsp('insp-x')) {
    rinsp('insp-x').textContent = fmtVal(p.x);
    rinsp('insp-y').textContent = fmtVal(p.y);
    rinsp('insp-w').textContent = fmtVal(p.w);
    rinsp('insp-h').textContent = fmtVal(p.h);
  }
});

document.addEventListener('mouseup', e => {
  // Finish marquee
  if (marqueeState && editMode) {
    const stage = document.getElementById('stage');
    const rect = stage.getBoundingClientRect();
    const ex = (e.clientX - rect.left) / zoom;
    const ey = (e.clientY - rect.top) / zoom;
    const left = Math.min(marqueeState.startX, ex) / STAGE_W;
    const right = Math.max(marqueeState.startX, ex) / STAGE_W;
    const top = Math.min(marqueeState.startY, ey) / STAGE_H;
    const bottom = Math.max(marqueeState.startY, ey) / STAGE_H;

    const posSystem = (displayData && displayData.posSystem) || 'unit_square';
    const hits = allCtrls().filter(c => {
      if (getMeta(c).hidden || getMeta(c).locked) return false;
      const cx = resolveGeo(c, 'x', posSystem);
      const cy = resolveGeo(c, 'y', posSystem);
      const cw = resolveGeo(c, 'w', posSystem);
      const ch = resolveGeo(c, 'h', posSystem);
      return cx < right && cx + cw > left && cy < bottom && cy + ch > top;
    });

    document.getElementById('marquee').style.display = 'none';
    marqueeState = null;

    if (hits.length) {
      if (e.shiftKey || e.ctrlKey || e.metaKey) {
        hits.forEach(c => selectedSet.add(c));
        selectedCtrl = hits[hits.length - 1];
      } else {
        selectMulti(hits);
      }
    }
    return;
  }

  if (dragging && dragging.moved) {
    pushUndo();
  }
  dragging = null;
  clearGuides();
});

function snapVal(v) {
  if (!document.getElementById('snap-chk').checked) return v;
  const step = parseFloat(document.getElementById('snap-size').value) || 0.01;
  return Math.round(v / step) * step;
}

// ============================================================
// Zoom + Stage size
// ============================================================
const stage = document.getElementById('stage');
const zoomLabel = document.getElementById('zoom-label');

function setZoom(z) {
  zoom = Math.max(0.2, Math.min(4, z));
  stage.style.width = (STAGE_W * zoom) + 'px';
  stage.style.height = (STAGE_H * zoom) + 'px';
  zoomLabel.textContent = Math.round(zoom * 100) + '%';
  renderControls();
}

document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoom + 0.1));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoom - 0.1));
document.getElementById('zoom-fit').addEventListener('click', () => {
  const wrap = document.getElementById('canvas-wrap');
  const wz = (wrap.clientWidth - 80) / STAGE_W;
  const hz = (wrap.clientHeight - 80) / STAGE_H;
  setZoom(Math.min(wz, hz, 1.5));
});

// Mouse-wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.1 : -0.1;
  setZoom(zoom + delta);
}, { passive: false });

// Stage resolution picker
document.getElementById('stage-res').addEventListener('change', e => {
  const parts = e.target.value.split(',');
  SCREEN_W = parseInt(parts[0]);
  SCREEN_H = parseInt(parts[1]);
  // Keep logical stage at half res (960x540 for 1920x1080, etc.)
  STAGE_W = SCREEN_W / 2;
  STAGE_H = SCREEN_H / 2;
  document.getElementById('stage-label').textContent = SCREEN_W + ' × ' + SCREEN_H;
  setZoom(zoom);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (inInput) return;

  if (e.key === 'Escape') {
    selectCtrl(null);
    document.getElementById('palette-modal').classList.remove('open');
    e.preventDefault();
    return;
  }
  if (e.key === '+' || e.key === '=') { setZoom(zoom + 0.1); e.preventDefault(); return; }
  if (e.key === '-') { setZoom(zoom - 0.1); e.preventDefault(); return; }
  if (e.key === 'f' || e.key === 'F') { document.getElementById('zoom-fit').click(); e.preventDefault(); return; }

  // Undo / Redo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { undoAction(); e.preventDefault(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { redoAction(); e.preventDefault(); return; }

  // Copy / Paste / Duplicate / Delete (edit mode)
  if (editMode) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'c') { copySelection(); e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'v') { pasteSelection(); e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'd') { duplicateSelection(); e.preventDefault(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') { deleteSelection(); e.preventDefault(); return; }

    // Group / Ungroup
    if ((e.ctrlKey || e.metaKey) && e.key === 'g' && !e.shiftKey) { groupSelection(); e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'g' && e.shiftKey) { ungroupSelection(); e.preventDefault(); return; }

    // Add control palette
    if (e.key === 'a' || e.key === 'A') { openPalette(); e.preventDefault(); return; }

    // Arrow nudge (fractional units)
    const arrows = { ArrowLeft: [-1,0], ArrowRight: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1] };
    if (arrows[e.key] && selectedSet.size) {
      const nudgeStep = 0.001; // 0.1% of screen
      const mult = e.shiftKey ? 10 : 1;
      const [ndx, ndy] = arrows[e.key].map(v => v * nudgeStep * mult);
      pushUndo();
      for (const c of selectedSet) {
        if (getMeta(c).locked) continue;
        const r = c.resolved || c.props || {};
        const p = c.props || {};
        const posSystem = (displayData && displayData.posSystem) || 'unit_square';
        const cx = resolveGeo(c, 'x', posSystem);
        const cy = resolveGeo(c, 'y', posSystem);
        p.x = Math.max(0, cx + ndx);
        p.y = Math.max(0, cy + ndy);
        if (c.resolved) { c.resolved.x = p.x; c.resolved.y = p.y; }
      }
      renderControls();
      renderInspector();
      e.preventDefault();
      return;
    }
  }
});

// ============================================================
// Edit / Preview mode toggle
// ============================================================
function setMode(isEdit) {
  editMode = isEdit;
  document.getElementById('btn-preview').classList.toggle('active', !isEdit);
  document.getElementById('btn-edit').classList.toggle('active', isEdit);
  document.getElementById('edit-toolbar').classList.toggle('visible', isEdit);
  renderControls();
  updateUndoButtons();
}

document.getElementById('btn-preview').addEventListener('click', () => setMode(false));
document.getElementById('btn-edit').addEventListener('click', () => setMode(true));

// ============================================================
// Pro editing: Copy / Paste / Duplicate / Delete
// ============================================================
function copySelection() {
  if (!selectedSet.size) return;
  clipboard = [...selectedSet].map(c => JSON.parse(JSON.stringify(c)));
  setStatus('Copied ' + clipboard.length + ' control(s).', 'ok');
}

function pasteSelection() {
  if (!clipboard.length || !displayData) return;
  pushUndo();
  const offset = 0.02;
  const newCtrls = clipboard.map(snap => {
    const c = JSON.parse(JSON.stringify(snap));
    c.name = uniqueName(c.name);
    c.idc = nextIdc();
    if (c.props) { c.props.x = (parseFloat(c.props.x) || 0) + offset; c.props.y = (parseFloat(c.props.y) || 0) + offset; }
    if (c.resolved) { c.resolved.x = (parseFloat(c.resolved.x) || 0) + offset; c.resolved.y = (parseFloat(c.resolved.y) || 0) + offset; }
    c._section = snap._section || 'controls';
    return c;
  });
  newCtrls.forEach(c => {
    if (c._section === 'background') (displayData.background = displayData.background || []).push(c);
    else (displayData.controls = displayData.controls || []).push(c);
  });
  selectMulti(newCtrls);
  renderAll();
  setStatus('Pasted ' + newCtrls.length + ' control(s).', 'ok');
}

function duplicateSelection() {
  copySelection();
  pasteSelection();
}

function deleteSelection() {
  if (!selectedSet.size) return;
  pushUndo();
  const toDelete = new Set(selectedSet);
  displayData.background = (displayData.background || []).filter(c => !toDelete.has(c));
  displayData.controls = (displayData.controls || []).filter(c => !toDelete.has(c));
  selectedSet.clear();
  selectedCtrl = null;
  renderAll();
  setStatus('Deleted ' + toDelete.size + ' control(s).', 'ok');
}

function uniqueName(base) {
  const existing = new Set(allCtrls().map(c => c.name));
  if (!existing.has(base)) return base;
  let i = 2;
  while (existing.has(base + '_' + i)) i++;
  return base + '_' + i;
}

// ============================================================
// Pro editing: Align + Distribute
// ============================================================
function alignSelection(mode) {
  const ctrls = [...selectedSet].filter(c => !getMeta(c).locked);
  if (ctrls.length < 2) return;
  pushUndo();
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';

  const geos = ctrls.map(c => ({
    c,
    x: resolveGeo(c, 'x', posSystem), y: resolveGeo(c, 'y', posSystem),
    w: resolveGeo(c, 'w', posSystem), h: resolveGeo(c, 'h', posSystem),
  }));

  let ref;
  switch (mode) {
    case 'left':   ref = Math.min(...geos.map(g => g.x)); geos.forEach(g => setGeo(g.c,'x',ref)); break;
    case 'right':  ref = Math.max(...geos.map(g => g.x + g.w)); geos.forEach(g => setGeo(g.c,'x',ref - g.w)); break;
    case 'top':    ref = Math.min(...geos.map(g => g.y)); geos.forEach(g => setGeo(g.c,'y',ref)); break;
    case 'bottom': ref = Math.max(...geos.map(g => g.y + g.h)); geos.forEach(g => setGeo(g.c,'y',ref - g.h)); break;
    case 'hcenter': ref = (Math.min(...geos.map(g=>g.x)) + Math.max(...geos.map(g=>g.x+g.w))) / 2;
      geos.forEach(g => setGeo(g.c,'x',ref - g.w/2)); break;
    case 'vcenter': ref = (Math.min(...geos.map(g=>g.y)) + Math.max(...geos.map(g=>g.y+g.h))) / 2;
      geos.forEach(g => setGeo(g.c,'y',ref - g.h/2)); break;
  }
  renderControls();
  renderInspector();
}

function distributeSelection(axis) {
  const ctrls = [...selectedSet].filter(c => !getMeta(c).locked);
  if (ctrls.length < 3) return;
  pushUndo();
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';
  if (axis === 'h') {
    const sorted = [...ctrls].sort((a,b) => resolveGeo(a,'x',posSystem) - resolveGeo(b,'x',posSystem));
    const first = resolveGeo(sorted[0],'x',posSystem);
    const last = resolveGeo(sorted[sorted.length-1],'x',posSystem) + resolveGeo(sorted[sorted.length-1],'w',posSystem);
    const totalW = sorted.reduce((s,c) => s + resolveGeo(c,'w',posSystem), 0);
    const gap = (last - first - totalW) / (sorted.length - 1);
    let cx = first;
    sorted.forEach(c => { setGeo(c,'x',cx); cx += resolveGeo(c,'w',posSystem) + gap; });
  } else {
    const sorted = [...ctrls].sort((a,b) => resolveGeo(a,'y',posSystem) - resolveGeo(b,'y',posSystem));
    const first = resolveGeo(sorted[0],'y',posSystem);
    const last = resolveGeo(sorted[sorted.length-1],'y',posSystem) + resolveGeo(sorted[sorted.length-1],'h',posSystem);
    const totalH = sorted.reduce((s,c) => s + resolveGeo(c,'h',posSystem), 0);
    const gap = (last - first - totalH) / (sorted.length - 1);
    let cy = first;
    sorted.forEach(c => { setGeo(c,'y',cy); cy += resolveGeo(c,'h',posSystem) + gap; });
  }
  renderControls();
}

function setGeo(ctrl, key, val) {
  if (!ctrl.props) ctrl.props = {};
  ctrl.props[key] = val;
  if (ctrl.resolved) ctrl.resolved[key] = val;
}

// ============================================================
// Pro editing: Z-order
// ============================================================
function zOrder(action) {
  if (!selectedCtrl || !displayData) return;
  pushUndo();
  const ctrl = selectedCtrl;
  // Operate within the correct section array
  const arr = ctrl._section === 'background' ? displayData.background : displayData.controls;
  if (!arr) return;
  const idx = arr.indexOf(ctrl);
  if (idx < 0) return;
  switch (action) {
    case 'front': arr.splice(idx,1); arr.push(ctrl); break;
    case 'back':  arr.splice(idx,1); arr.unshift(ctrl); break;
    case 'up':    if (idx < arr.length-1) { [arr[idx],arr[idx+1]] = [arr[idx+1],arr[idx]]; } break;
    case 'down':  if (idx > 0) { [arr[idx],arr[idx-1]] = [arr[idx-1],arr[idx]]; } break;
  }
  renderAll();
}

// ============================================================
// Pro editing: Group / Ungroup
// ============================================================
function groupSelection() {
  const ctrls = [...selectedSet];
  if (ctrls.length < 2) return;
  pushUndo();
  groupCounter++;
  const gid = groupCounter;
  ctrls.forEach(c => getMeta(c).groupId = gid);
  renderAll();
  setStatus('Grouped ' + ctrls.length + ' controls (group ' + gid + ').', 'ok');
}

function ungroupSelection() {
  const ctrls = [...selectedSet];
  if (!ctrls.length) return;
  pushUndo();
  // Collect all group IDs in selection
  const gids = new Set(ctrls.map(c => getMeta(c).groupId).filter(g => g !== null));
  // Ungroup ALL controls in those groups
  allCtrls().forEach(c => { if (gids.has(getMeta(c).groupId)) getMeta(c).groupId = null; });
  renderAll();
  setStatus('Ungrouped ' + gids.size + ' group(s).', 'ok');
}

// Clicking a grouped control selects entire group
function maybeSelectGroup(ctrl) {
  const meta = getMeta(ctrl);
  if (meta.groupId === null) { selectCtrl(ctrl); return; }
  const group = allCtrls().filter(c => getMeta(c).groupId === meta.groupId);
  selectMulti(group);
}

function addControlFromPalette() {
  const nameEl = document.getElementById('pal-name');
  const baseEl = document.getElementById('pal-base');
  const idcEl = document.getElementById('pal-idc');
  const secEl = document.getElementById('pal-section');

  const section = secEl.value;

  pushUndo();

  // Build a new control with sensible defaults
  const resolved = uiData.baseClasses && uiData.baseClasses[baseClass]
    ? Object.assign({}, uiData.baseClasses[baseClass].props || {})
    : {};

  const newCtrl = {
    name,
    baseClass,
    idc,
    props: { x: 0.1, y: 0.1, w: 0.15, h: 0.05 },
    resolved: Object.assign({ x: 0.1, y: 0.1, w: 0.15, h: 0.05 }, resolved),

    displayData.background.push(newCtrl);

    if (!displayData.controls) displayData.controls = [];
    displayData.controls.push(newCtrl);
  }

  closePalette();
  selectCtrl(newCtrl);
  renderAll();
  setStatus('Added ' + name + ' (' + baseClass + ', idc ' + idc + ').', 'ok');
}
