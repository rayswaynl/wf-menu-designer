<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF Menu / HUD Designer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2096%2096'%3E%3Cpolyline%20points%3D'20%2C54%2048%2C30%2076%2C54'%20fill%3D'none'%20stroke%3D'%23D9763C'%20stroke-width%3D'7'%2F%3E%3Cpolyline%20points%3D'20%2C72%2048%2C48%2076%2C72'%20fill%3D'none'%20stroke%3D'%235C6536'%20stroke-width%3D'7'%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ---- CSS Variables ---- */
:root {
  --gunmetal: #14171B;
  --steel: #2A2F36;
  --steel2: #343b44;
  --olive: #5C6536;
  --bone: #E7E3D6;
  --orange: #D9763C;
  --orange-deep: #B85F2A;
  --chalk: #F2EFE8;
  --line: #39414b;
  --danger: #c0392b;
  --cyan: #4BB8C8;
  --wasp-blue: rgba(66,182,255,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Inter,system-ui,'Segoe UI',Arial,sans-serif;background:var(--gunmetal);color:var(--bone);overflow:hidden}
h1,h2,h3{font-family:Oswald,Inter,sans-serif;font-weight:600;letter-spacing:.5px}

/* ---- Brand bar ---- */
.brandbar{height:50px;display:flex;align-items:center;gap:12px;padding:0 14px;
  background:#101317;border-bottom:1px solid var(--line);position:relative;z-index:5;flex:0 0 auto}
.brandbar .mark{width:30px;height:30px;flex:0 0 auto}
.brandbar .word{display:flex;flex-direction:column;line-height:1}
.brandbar .word .t1{font-family:Oswald,sans-serif;font-weight:600;font-size:17px;letter-spacing:2px;color:var(--bone)}
.brandbar .word .t2{font-family:Oswald,sans-serif;font-weight:400;font-size:9px;letter-spacing:5px;color:var(--orange);margin-top:2px}
.brandbar .spacer{flex:1}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8b939c;border:1px solid var(--line);border-radius:10px;padding:3px 9px;background:#0d1014}
.chip b{color:var(--olive)}
.brand-actions{display:flex;gap:8px;align-items:center}

/* ---- Layout ---- */
.layout{display:flex;height:calc(100vh - 50px);overflow:hidden}
.panel{display:flex;flex-direction:column;min-height:0}
.panel-left{width:200px;flex:0 0 200px;border-right:1px solid var(--line);background:var(--steel)}
.panel-center{flex:1;min-width:0;background:var(--gunmetal)}
.panel-right{width:260px;flex:0 0 260px;border-left:1px solid var(--line);background:var(--steel)}

.panel-hdr{padding:9px 12px;border-bottom:1px solid var(--line);background:var(--gunmetal);flex:0 0 auto}
.panel-hdr h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#9aa3ad}
.scroll{overflow-y:auto;flex:1;min-height:0}

/* ---- Display picker ---- */
.display-picker-wrap{padding:8px;flex:0 0 auto;border-bottom:1px solid var(--line)}
.display-picker-wrap label{font-family:'JetBrains Mono',monospace;font-size:9px;color:#9aa3ad;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
#display-picker{width:100%;background:var(--gunmetal);border:1px solid var(--line);color:var(--bone);border-radius:4px;padding:5px 7px;font-family:'JetBrains Mono',monospace;font-size:10px;outline:none;cursor:pointer}
#display-picker:focus{border-color:var(--orange)}
#display-picker optgroup{color:#9aa3ad;font-style:normal;font-size:9px}
#display-picker option{color:var(--bone);background:var(--gunmetal)}

/* ---- Mode toggle ---- */
.mode-toggle{display:flex;gap:6px;padding:6px 8px;border-bottom:1px solid var(--line);flex:0 0 auto;align-items:center}
.mode-btn{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 6px;border-radius:3px;border:1px solid var(--line);background:transparent;color:#9aa3ad;cursor:pointer;transition:all .12s;text-align:center}
.mode-btn.active{background:var(--orange);border-color:var(--orange);color:#1a1208;font-weight:600}
.mode-btn:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* ---- Layer list ---- */
.layer-item{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;
  border-bottom:1px solid rgba(57,65,75,.4);font-size:11px;transition:background .08s}
.layer-item:hover{background:rgba(255,255,255,.04)}
.layer-item.selected{background:rgba(217,118,60,.12);border-left:2px solid var(--orange)}
.layer-item.bg-ctrl{border-left:2px solid var(--line)}
.layer-dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px}
.layer-idc{font-family:'JetBrains Mono',monospace;font-size:9px;color:#556;margin-left:auto;white-space:nowrap}
.layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.layer-hdr{padding:4px 10px;font-size:9px;font-family:'JetBrains Mono',monospace;color:#39414b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(57,65,75,.3)}

/* ---- Canvas area ---- */
.canvas-toolbar{padding:8px 12px;border-bottom:1px solid var(--line);background:#101317;
  display:flex;align-items:center;gap:10px;flex:0 0 auto;flex-wrap:wrap}
.canvas-toolbar label{font-size:10px;color:#9aa3ad;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;cursor:pointer}
.canvas-toolbar input[type=checkbox]{accent-color:var(--orange)}
.canvas-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:flex-start;
  padding:32px;background:#0a0c0f;position:relative}
.canvas-center{margin:auto;position:relative}

/* The 16:9 game frame */
.stage{position:relative;flex:0 0 auto;user-select:none;overflow:hidden;
  background:#0d0f12;
  box-shadow:0 0 0 1px #39414b, 0 4px 40px rgba(0,0,0,.7)}

/* Resolution/backdrop labels */
.stage-label{position:absolute;top:-22px;left:0;font-family:'JetBrains Mono',monospace;font-size:10px;color:#39414b;pointer-events:none;white-space:nowrap}
.stage-label-side{position:absolute;top:0;left:-44px;writing-mode:vertical-rl;transform:rotate(180deg);font-family:'JetBrains Mono',monospace;font-size:10px;color:#39414b;pointer-events:none;white-space:nowrap;height:100%;display:flex;align-items:center;justify-content:center}

/* ---- WYSIWYG Control rendering ---- */
.ctrl{position:absolute;overflow:hidden;cursor:move;box-sizing:border-box}

/* Edit mode affordances */
.ctrl.edit-mode::after{
  content:'';position:absolute;inset:0;
  border:1px solid rgba(75,184,200,.35);
  pointer-events:none;z-index:1;
}
.ctrl.selected.edit-mode::after{
  border:2px solid var(--orange)!important;
}
.ctrl.selected{z-index:9999!important}

/* Resize handle (edit mode only) */
.ctrl .rh{position:absolute;right:-4px;bottom:-4px;width:9px;height:9px;
  background:var(--orange);cursor:se-resize;z-index:10;border-radius:1px;display:none}
.edit-mode .rh{display:block}

/* ---- Per-type style bases ---- */

/* CT_STATIC / RscText — styled text */
.wt-rsctext{
  display:flex;align-items:center;
  font-family:Inter,'Segoe UI',system-ui,sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding:0 2px;
}

/* IGUIBack — translucent panel */
.wt-iguiback{
  background:rgba(0,0,0,.6);
}

/* RscFrame — border only */
.wt-rscframe{
  background:transparent;
  border:1px solid rgba(255,255,255,.85)!important;
}

/* RscButton (olive) */
.wt-rscbutton{
  display:flex;align-items:center;justify-content:center;
  font-family:Inter,'Segoe UI',system-ui,sans-serif;
  font-weight:600;letter-spacing:.3px;
  text-align:center;overflow:hidden;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 1px 3px rgba(0,0,0,.4);
}

/* RscButton_Main (WASP blue) */
.wt-rscbutton-main{
  background:rgba(66,182,255,.7)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 0 8px rgba(66,182,255,.25);
}

/* RscButton_Exit (red) */
.wt-rscbutton-exit{
  background:rgba(128,0,0,1)!important;
}

/* RscShortcutButtonMain — big WASP hub tile */
.wt-shortcutbuttonmain{
  display:flex;align-items:center;
  background:transparent!important;
  border:2px solid rgba(66,182,255,.85)!important;
  box-shadow:inset 0 0 20px rgba(66,182,255,.08), 0 0 8px rgba(66,182,255,.2);
  padding:0;overflow:hidden;cursor:pointer;
}
.wt-shortcutbuttonmain .sb-icon{
  flex:0 0 auto;width:18%;height:100%;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(66,182,255,.35);
  background:rgba(66,182,255,.08);
  font-size:70%;color:rgba(66,182,255,.7);
}
.wt-shortcutbuttonmain .sb-label{
  flex:1;padding:0 6%;
  font-family:Inter,'Segoe UI',system-ui,sans-serif;
  font-weight:600;color:rgba(229,229,229,1);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-align:left;
  text-shadow:0 0 8px rgba(66,182,255,.5);
}

/* RscShortcutButton — smaller tile */
.wt-shortcutbutton{
  display:flex;align-items:center;
  background:transparent!important;
  border:1px solid rgba(138,146,102,.8)!important;
  box-shadow:inset 0 0 10px rgba(138,146,102,.06);
  padding:0;overflow:hidden;cursor:pointer;
}
.wt-shortcutbutton .sb-icon{
  flex:0 0 auto;width:22%;height:100%;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(138,146,102,.3);
  background:rgba(138,146,102,.08);
  font-size:70%;color:rgba(138,146,102,.8);
}
.wt-shortcutbutton .sb-label{
  flex:1;padding:0 5%;
  font-family:Inter,'Segoe UI',system-ui,sans-serif;
  font-size:85%;color:rgba(229,229,229,.9);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-align:left;
}

/* RscListBox / RscListnBox */
.wt-listbox{
  background:rgba(0,0,0,.95)!important;
  border:1px solid rgba(66,182,255,.5)!important;
  display:flex;flex-direction:column;overflow:hidden;
}
.wt-listbox .lb-header{
  flex:0 0 auto;
  background:rgba(66,182,255,.15);
  border-bottom:1px solid rgba(66,182,255,.3);
  padding:0 4px;
  display:flex;align-items:center;
  font-family:Inter,sans-serif;font-weight:600;
  color:rgba(66,182,255,.9);
  font-size:80%;
  min-height:20%;
}
.wt-listbox .lb-rows{
  flex:1;overflow:hidden;padding:2px 0;
}
.wt-listbox .lb-row{
  padding:1px 4px;
  font-family:Inter,sans-serif;
  color:rgba(255,255,255,.75);
  font-size:75%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.wt-listbox .lb-row.sel{
  background:rgba(66,182,255,.25);
  color:rgba(66,182,255,1);
}
.wt-listbox .lb-scrollbar{
  position:absolute;right:0;top:0;width:5px;height:100%;
  background:rgba(255,255,255,.08);
}
.wt-listbox .lb-scrollbar-thumb{
  width:100%;height:40%;
  background:rgba(255,255,255,.35);border-radius:2px;
}

/* RscCombo */
.wt-combo{
  background:rgba(0,0,0,.75)!important;
  border:1px solid rgba(66,182,255,.4)!important;
  display:flex;align-items:center;overflow:hidden;
}
.wt-combo .combo-text{
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:Inter,sans-serif;color:rgba(255,255,255,.75);
  padding:0 4px;font-size:80%;
}
.wt-combo .combo-arrow{
  flex:0 0 auto;width:18%;height:100%;
  display:flex;align-items:center;justify-content:center;
  border-left:1px solid rgba(66,182,255,.25);
  background:rgba(66,182,255,.1);
  color:rgba(66,182,255,.9);
  font-size:80%;
}

/* RscEdit */
.wt-edit{
  background:rgba(0,0,0,.6)!important;
  border:1px solid rgba(255,255,255,.3)!important;
  display:flex;align-items:center;overflow:hidden;
}
.wt-edit .edit-inner{
  flex:1;padding:0 5px;
  font-family:Inter,sans-serif;color:rgba(255,255,255,.75);font-size:80%;
  white-space:nowrap;overflow:hidden;
}
.wt-edit::after{
  content:'|';color:rgba(66,182,255,.8);
  position:absolute;left:6px;top:50%;transform:translateY(-50%);
  animation:blink 1s step-end infinite;
  pointer-events:none;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* RscStructuredText */
.wt-structuredtext{
  display:flex;align-items:flex-start;overflow:hidden;
  font-family:Inter,sans-serif;color:rgba(238,229,139,1);
  padding:1px 3px;
}

/* RscPicture / RscClickableText — icon placeholder */
.wt-picture{
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.2)!important;
  overflow:hidden;
}
.wt-picture .pic-icon{
  font-size:40%;opacity:.6;
  display:flex;flex-direction:column;align-items:center;gap:1px;
}

/* RscMapControl */
.wt-mapcontrol{
  background:rgba(60,75,55,.85)!important;
  border:1px solid rgba(100,120,80,.6)!important;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.wt-mapcontrol .map-label{
  font-family:Inter,sans-serif;font-size:80%;font-weight:600;
  color:rgba(150,180,120,.8);letter-spacing:2px;text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}

/* RscXSliderH */
.wt-slider{
  display:flex;align-items:center;padding:0 4px;overflow:hidden;
  background:rgba(0,0,0,.2)!important;
}
.wt-slider .sl-track{
  flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;position:relative;margin:0 4px;
}
.wt-slider .sl-fill{
  position:absolute;left:0;top:0;width:40%;height:100%;
  background:rgba(255,255,255,.5);border-radius:2px;
}
.wt-slider .sl-thumb{
  position:absolute;left:38%;top:50%;transform:translate(-50%,-50%);
  width:6px;height:100%;min-height:10px;
  background:rgba(255,255,255,.85);border-radius:1px;
}
.wt-slider .sl-arr{font-size:70%;color:rgba(255,255,255,.5)}

/* RscControlsGroup */
.wt-ctrlgroup{
  background:rgba(50,50,80,.1)!important;
  border:1px dashed rgba(68,68,170,.5)!important;
}

/* CT_STATIC background panel (IGUIBack-style) */
.wt-bg-panel{
  background:rgba(0,0,0,.7)!important;
}

/* ---- Inspector ---- */
.inspector{padding:10px 12px}
.inspector h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9aa3ad;margin-bottom:8px}
.field-row{margin-bottom:7px}
.field-row label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9aa3ad;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.field-row input,.field-row select{width:100%;background:var(--gunmetal);border:1px solid var(--line);
  color:var(--bone);border-radius:4px;padding:5px 7px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none}
.field-row input:focus,.field-row select:focus{border-color:var(--orange)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.inspector-placeholder{font-size:11px;color:#556;font-family:'JetBrains Mono',monospace;
  padding:20px 12px;text-align:center;line-height:1.6}

/* Resolved prop display */
.resolved-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;
  background:rgba(66,182,255,.1);border:1px solid rgba(66,182,255,.25);color:rgba(66,182,255,.9);
  border-radius:3px;padding:1px 5px;margin-bottom:4px}
.prop-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 8px;margin-bottom:8px}
.prop-k{font-family:'JetBrains Mono',monospace;font-size:9px;color:#9aa3ad;white-space:nowrap}
.prop-v{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--bone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.color-swatch{display:inline-block;width:10px;height:10px;border-radius:2px;border:1px solid rgba(255,255,255,.2);vertical-align:middle;margin-right:3px}

/* ---- Export / load panel ---- */
.export-panel{border-top:1px solid var(--line);flex:0 0 auto}
.export-panel-hdr{padding:8px 12px;border-bottom:1px solid var(--line);background:var(--gunmetal);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;user-select:none}
.export-panel-hdr h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9aa3ad}
.export-panel-hdr .tog{font-size:10px;color:#556}
.export-body{padding:8px 12px;display:none}
.export-body.open{display:block}
.export-body textarea{width:100%;background:var(--gunmetal);border:1px solid var(--line);
  color:#a8d890;font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:4px;
  padding:6px;resize:vertical;outline:none;min-height:80px}
.export-body textarea:focus{border-color:var(--orange)}
.btnbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
button{cursor:pointer;background:var(--steel2);color:var(--bone);border:1px solid var(--line);
  border-radius:4px;padding:5px 10px;font-family:Inter,sans-serif;font-size:11px}
button:hover{border-color:var(--orange)}
button.primary{background:var(--orange);border-color:var(--orange);color:#1a1208;font-weight:600}
button.primary:hover{background:var(--orange-deep);border-color:var(--orange-deep)}
button.sm{font-size:10px;padding:4px 8px}
button.flash{animation:btn-flash .4s ease}
@keyframes btn-flash{0%{background:var(--olive);border-color:var(--olive);color:#fff}100%{}}

/* ---- Status ---- */
#status-msg{font-size:10px;color:#9aa3ad;font-family:'JetBrains Mono',monospace;min-height:14px;margin-top:4px}
#status-msg.ok{color:var(--olive)}
#status-msg.err{color:var(--danger)}

/* ---- Cross-link ---- */
.xlink-btn{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;
  color:#8b939c;border:1px solid var(--line);border-radius:10px;padding:3px 9px;background:#0d1014;
  text-decoration:none;cursor:pointer;transition:border-color .12s,color .12s}
.xlink-btn:hover{border-color:var(--orange);color:var(--orange)}
.xlink-dot{width:6px;height:6px;border-radius:50%;background:#884488;flex:0 0 6px}

/* ---- Scrollbars ---- */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--steel2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<!-- Brand bar -->
<div class="brandbar" role="banner">
  <svg class="mark" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
    <g fill="none" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter">
      <polyline points="20,54 48,30 76,54" stroke="#D9763C"/>
      <polyline points="20,72 48,48 76,72" stroke="#5C6536"/>
    </g>
  </svg>
  <div class="word" aria-label="WF Menu / HUD Designer — WASP Warfare Arma 2">
    <span class="t1">WF MENU / HUD DESIGNER</span>
    <span class="t2">WASP WARFARE · ARMA 2</span>
  </div>
  <div class="spacer"></div>
  <div class="brand-actions">
    <span class="chip" id="ctrl-count-chip" aria-live="polite" aria-atomic="true"><b>0</b> controls</span>
    <span class="chip" id="dialog-chip">—</span>
    <a class="xlink-btn" href="https://rayswaynl.github.io/garrison-editor/" target="_blank" rel="noopener"
       title="Open Garrison Editor" aria-label="Open Garrison Editor">
      <span class="xlink-dot" aria-hidden="true"></span>Garrison Editor ↗
    </a>
  </div>
</div>

<!-- Main 3-column layout -->
<div class="layout" role="main">

  <!-- Left: Display picker + layer list -->
  <div class="panel panel-left" role="region" aria-label="Display picker and layers">
    <div class="display-picker-wrap">
      <label for="display-picker">Display</label>
      <select id="display-picker" aria-label="Select display to load">
        <option value="">— loading —</option>
      </select>
    </div>

    <div class="mode-toggle" role="group" aria-label="Edit or preview mode">
      <button class="mode-btn active" id="btn-preview" title="Preview mode — clean render">Preview</button>
      <button class="mode-btn" id="btn-edit" title="Edit mode — selection handles + drag/resize">Edit</button>
    </div>

    <div class="panel-hdr"><h2 id="layers-heading">Layers</h2></div>
    <div class="scroll" id="layer-list" role="list" aria-labelledby="layers-heading" aria-live="polite"></div>
  </div>

  <!-- Center: Canvas -->
  <div class="panel panel-center" role="region" aria-label="Canvas">
    <div class="canvas-toolbar" role="toolbar" aria-label="Canvas controls">
      <label>
        <input type="checkbox" id="snap-chk" aria-label="Enable grid snap">
        Grid snap
      </label>
      <label for="snap-size">Grid:</label>
      <select id="snap-size" aria-label="Grid snap size" style="width:58px;background:var(--gunmetal);border:1px solid var(--line);color:var(--bone);border-radius:3px;padding:3px 5px;font-size:10px;font-family:'JetBrains Mono',monospace">
        <option value="0.01">1%</option>
        <option value="0.005">0.5%</option>
        <option value="0.02">2%</option>
      </select>
      <label for="stage-res">Screen:</label>
      <select id="stage-res" aria-label="Stage resolution" style="background:var(--gunmetal);border:1px solid var(--line);color:var(--bone);border-radius:3px;padding:3px 5px;font-size:10px;font-family:'JetBrains Mono',monospace">
        <option value="1920,1080">1920×1080</option>
        <option value="1280,720">1280×720</option>
        <option value="2560,1440">2560×1440</option>
      </select>
      <div style="flex:1"></div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#556" id="cursor-pos" aria-live="off">x:0 y:0</span>
      <button class="sm" id="zoom-out" title="Zoom out" aria-label="Zoom out">−</button>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#9aa3ad;min-width:36px;text-align:center" id="zoom-label" aria-live="polite">100%</span>
      <button class="sm" id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
      <button class="sm" id="zoom-fit" title="Fit canvas to view" aria-label="Fit canvas to view">fit</button>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="canvas-center" id="canvas-center">
        <div class="stage-label" id="stage-label">1920 × 1080</div>
        <div class="stage-label-side">GAME FRAME</div>
        <div class="stage" id="stage" role="application" aria-label="Dialog canvas — click to select, drag to move">
          <!-- controls rendered here by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Inspector + Export -->
  <div class="panel panel-right" role="region" aria-label="Inspector and export">
    <div class="panel-hdr"><h2>Inspector</h2></div>
    <div class="scroll" id="inspector-wrap">
      <div class="inspector-placeholder" id="inspector-placeholder">Select a control<br>to inspect its properties</div>
      <div class="inspector" id="inspector" style="display:none">
        <div id="insp-name" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--bone);margin-bottom:4px;font-weight:600"></div>
        <div id="insp-baseclass" class="resolved-badge" style="margin-bottom:8px"></div>

        <div class="field-row">
          <label for="f-idc">IDC</label>
          <input type="number" id="f-idc" readonly style="opacity:.7">
        </div>
        <div class="field-row">
          <label for="f-text">Text</label>
          <input type="text" id="f-text" placeholder="(none)" readonly style="opacity:.7">
        </div>

        <div style="height:1px;background:var(--line);margin:8px 0"></div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9aa3ad;font-family:'JetBrains Mono',monospace;margin-bottom:6px">Geometry</div>
        <div class="grid-2" style="margin-bottom:8px">
          <div>
            <div class="prop-k">x</div>
            <div class="prop-v" id="insp-x">—</div>
          </div>
          <div>
            <div class="prop-k">y</div>
            <div class="prop-v" id="insp-y">—</div>
          </div>
          <div>
            <div class="prop-k">w</div>
            <div class="prop-v" id="insp-w">—</div>
          </div>
          <div>
            <div class="prop-k">h</div>
            <div class="prop-v" id="insp-h">—</div>
          </div>
        </div>

        <div style="height:1px;background:var(--line);margin:8px 0"></div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9aa3ad;font-family:'JetBrains Mono',monospace;margin-bottom:6px">Resolved Props</div>
        <div class="prop-grid" id="insp-resolved"></div>

        <div style="height:1px;background:var(--line);margin:8px 0"></div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9aa3ad;font-family:'JetBrains Mono',monospace;margin-bottom:6px">Overrides (delta)</div>
        <div class="prop-grid" id="insp-overrides"></div>
      </div>
    </div>

    <!-- Export panel -->
    <div class="export-panel" role="region" aria-label="Export">
      <div class="export-panel-hdr" id="export-toggle" role="button" tabindex="0"
           aria-expanded="false" aria-controls="export-body">
        <h2>Export .hpp</h2>
        <span class="tog" id="export-tog-label" aria-hidden="true">▼</span>
      </div>
      <div class="export-body" id="export-body">
        <textarea id="export-out" readonly placeholder="Click Export to generate…" rows="6" aria-label="Exported HPP code"></textarea>
        <div class="btnbar">
          <button class="sm primary" id="export-btn">Export</button>
          <button class="sm" id="copy-btn">Copy</button>
          <button class="sm" id="download-btn">Save .hpp</button>
        </div>
        <div id="status-msg" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Constants
// ============================================================

// Default 16:9 stage size (logical pixels at 100% zoom)
let STAGE_W = 960;  // logical display width; maps to 1920px at 2x, etc.
let STAGE_H = 540;  // 16:9
let SCREEN_W = 1920;
let SCREEN_H = 1080;

// SafeZone constants (16:9 preview)
const SZ = { X: 0.07, Y: 0.07, W: 0.86, H: 0.86 };

// ============================================================
// State
// ============================================================
let uiData = null;           // parsed ui.json
let currentDisplay = null;   // name of loaded display
let displayData = null;      // display object from uiData.displays
let selectedCtrl = null;     // selected control object (from display.background or .controls)
let zoom = 1.0;
let editMode = false;
let dragging = null;

// ============================================================
// Helpers
// ============================================================

function rgba(arr, alpha) {
  if (!Array.isArray(arr) || arr.length < 3) return 'rgba(0,0,0,0)';
  const r = Math.round(arr[0] * 255);
  const g = Math.round(arr[1] * 255);
  const b = Math.round(arr[2] * 255);
  const a = alpha !== undefined ? alpha : (arr[3] !== undefined ? arr[3] : 1);
  return `rgba(${r},${g},${b},${a})`;
}

function px(frac, dim) {
  // Convert 0..1 fraction to logical pixel for current stage
  return frac * dim;
}

/**
 * Evaluate a SafeZone position expression.
 * Handles strings like "0.882604 * safezoneW + safezoneX"
 * and plain numbers.
 */
function evalSZ(val) {
  if (typeof val === 'number') return val;
  if (typeof val !== 'string') return 0;

  const expr = val
    .replace(/safezoneX/g, SZ.X)
    .replace(/safezoneY/g, SZ.Y)
    .replace(/safezoneW/g, SZ.W)
    .replace(/safezoneH/g, SZ.H)
    .replace(/SafeZoneX/g, SZ.X)
    .replace(/SafeZoneY/g, SZ.Y)
    .replace(/SafeZoneW/g, SZ.W)
    .replace(/SafeZoneH/g, SZ.H);

  try {
    // eslint-disable-next-line no-new-func
    return Function('"use strict"; return (' + expr + ')')();
  } catch(e) {
    return parseFloat(val) || 0;
  }
}

/**
 * Clean a display text string:
 * "$STR_WF_MAIN_Purchase_Units" => "Purchase Units"
 * "$STR_RUBHUD_Money" => "Money"
 */
function cleanText(t) {
  if (!t || typeof t !== 'string') return '';
  if (!t.startsWith('$')) return t;
  return t
    .replace(/^\$STR_WF_MAIN_/, '')
    .replace(/^\$STR_WF_/, '')
    .replace(/^\$STR_RUBHUD_/, '')
    .replace(/^\$STR_/, '')
    .replace(/_/g, ' ')
    .trim();
}

/**
 * Get a WYSIWYG class from baseClass + resolved props.
 * Returns {wClass, subType} where wClass is the CSS class and subType is for further refinement.
 */
function getWClass(ctrl) {
  const base = (ctrl.baseClass || ctrl.rscBase || '').toLowerCase();
  const r = ctrl.resolved || {};

  if (base.includes('shortcutbuttonmain') || base === 'rscshotcutbuttonmain') return 'shortcutbuttonmain';
  if (base.includes('shortcutbutton')) return 'shortcutbutton';
  if (base.includes('button_exit') || base === 'rscbutton_exit') return 'button-exit';
  if (base.includes('button_back')) return 'button-main'; // treat << like main
  if (base.includes('button_main') || base === 'rscbutton_main') return 'button-main';
  if (base.includes('button')) return 'button';
  if (base === 'iguiback') return 'iguiback';
  if (base === 'rscframe') return 'rscframe';
  if (base.includes('mapcontrol') || base.includes('rscmapcontrol')) return 'mapcontrol';
  if (base.includes('listnbox') || base.includes('listboxa') || base === 'rsclistnbox') return 'listbox';
  if (base.includes('listbox')) return 'listbox';
  if (base.includes('combo')) return 'combo';
  if (base.includes('edit')) return 'edit';
  if (base.includes('clickabletext')) return 'picture';
  if (base.includes('picture') || base.includes('picturekeeper')) return 'picture';
  if (base.includes('structuredtext')) return 'structuredtext';
  if (base.includes('xsliderh')) return 'slider';
  if (base.includes('controlsgroup') || base.includes('rsccontrolsgroup')) return 'ctrlgroup';

  // Fallback by type number
  const type = r.type !== undefined ? r.type : (ctrl.props && ctrl.props.type);
  switch(type) {
    case 1: return 'button';
    case 2: return 'edit';
    case 4: return 'combo';
    case 5: return 'listbox';
    case 11: return 'picture';
    case 13: return 'structuredtext';
    case 15: return 'ctrlgroup';
    case 16: return 'shortcutbutton';
    case 43: return 'slider';
    case 101: return 'mapcontrol';
    case 102: return 'listbox';
    default: return 'rsctext';
  }
}

// Determine if a control is a background control (section)
function isBgCtrl(ctrl, display) {
  return (display.background || []).includes(ctrl) ||
    (ctrl._section === 'background');
}

// ============================================================
// Load ui.json
// ============================================================
async function loadUiJson() {
  try {
    const r = await fetch('assets/data/ui.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    uiData = await r.json();
    buildDisplayPicker();
    // Auto-load WF_Menu
    loadDisplay('WF_Menu');
  } catch(e) {
    console.error('Failed to load ui.json:', e);
    setStatus('Failed to load ui.json: ' + e.message, 'err');
  }
}

// ============================================================
// Display picker
// ============================================================
function buildDisplayPicker() {
  const sel = document.getElementById('display-picker');
  sel.innerHTML = '';

  const categories = {};
  for (const [name, d] of Object.entries(uiData.displays)) {
    const cat = d.category || 'dialog';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(name);
  }

  const catOrder = ['dialog', 'hud'];
  for (const cat of catOrder) {
    if (!categories[cat]) continue;
    const grp = document.createElement('optgroup');
    grp.label = cat.toUpperCase() + 'S';
    for (const name of categories[cat]) {
      const d = uiData.displays[name];
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name + ' (idd ' + d.idd + ')';
      grp.appendChild(opt);
    }
    sel.appendChild(grp);
  }

  sel.addEventListener('change', () => {
    if (sel.value) loadDisplay(sel.value);
  });
}

// ============================================================
// Load a display
// ============================================================
function loadDisplay(name) {
  if (!uiData || !uiData.displays[name]) return;
  currentDisplay = name;
  displayData = uiData.displays[name];
  selectedCtrl = null;

  // Tag controls with section
  for (const c of (displayData.background || [])) c._section = 'background';
  for (const c of (displayData.controls || [])) c._section = 'controls';

  // Update picker
  const sel = document.getElementById('display-picker');
  sel.value = name;

  // Update chip
  const total = (displayData.background || []).length + (displayData.controls || []).length;
  document.getElementById('ctrl-count-chip').innerHTML = '<b>' + total + '</b> controls';
  document.getElementById('dialog-chip').textContent = name + ' · idd ' + displayData.idd;

  renderAll();
}

// ============================================================
// Coordinate conversion
// ============================================================
function ctrlPx(ctrl) {
  // Returns {left, top, width, height} in logical stage pixels
  const r = ctrl.resolved || ctrl.props || {};
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';

  let xf, yf, wf, hf;
  if (posSystem === 'safezone') {
    xf = evalSZ(r.x !== undefined ? r.x : (ctrl.props && ctrl.props.x) || 0);
    yf = evalSZ(r.y !== undefined ? r.y : (ctrl.props && ctrl.props.y) || 0);
    wf = evalSZ(r.w !== undefined ? r.w : (ctrl.props && ctrl.props.w) || 0.1);
    hf = evalSZ(r.h !== undefined ? r.h : (ctrl.props && ctrl.props.h) || 0.04);
  } else {
    xf = parseFloat(r.x !== undefined ? r.x : (ctrl.props && ctrl.props.x) || 0);
    yf = parseFloat(r.y !== undefined ? r.y : (ctrl.props && ctrl.props.y) || 0);
    wf = parseFloat(r.w !== undefined ? r.w : (ctrl.props && ctrl.props.w) || 0.1);
    hf = parseFloat(r.h !== undefined ? r.h : (ctrl.props && ctrl.props.h) || 0.04);
  }

  return {
    left: xf * STAGE_W,
    top: yf * STAGE_H,
    width: Math.max(2, wf * STAGE_W),
    height: Math.max(2, hf * STAGE_H)
  };
}

// ============================================================
// WYSIWYG Control rendering
// ============================================================
function buildControlEl(ctrl, zIndex) {
  const r = ctrl.resolved || ctrl.props || {};
  const p = ctrl.props || {};
  const wclass = getWClass(ctrl);
  const geo = ctrlPx(ctrl);
  const isSelected = ctrl === selectedCtrl;

  const el = document.createElement('div');
  el.className = 'ctrl' + (editMode ? ' edit-mode' : '') + (isSelected ? ' selected' : '');
  el.dataset.name = ctrl.name || '';

  // Base geometry
  el.style.left = (geo.left * zoom) + 'px';
  el.style.top = (geo.top * zoom) + 'px';
  el.style.width = (geo.width * zoom) + 'px';
  el.style.height = (geo.height * zoom) + 'px';
  el.style.zIndex = zIndex;

  // Font size from sizeEx: sizeEx is fraction of screen height
  const sizeEx = r.sizeEx !== undefined ? r.sizeEx : 0.03;
  const fontPx = sizeEx * STAGE_H * zoom;

  // Apply WYSIWYG style based on type
  switch (wclass) {
    case 'iguiback': {
      el.classList.add('wt-iguiback');
      const bg = r.colorBackground || p.colorBackground;
      if (Array.isArray(bg)) el.style.background = rgba(bg);
      break;
    }

    case 'rscframe': {
      el.classList.add('wt-rscframe');
      const ct = r.colorText || p.colorText || [1,1,1,1];
      el.style.borderColor = rgba(ct);
      break;
    }

    case 'mapcontrol': {
      el.classList.add('wt-mapcontrol');
      const inner = document.createElement('div');
      inner.className = 'map-label';
      inner.textContent = 'MAP';
      inner.style.fontSize = Math.max(8, fontPx * 0.8) + 'px';
      el.appendChild(inner);
      break;
    }

    case 'shortcutbuttonmain': {
      el.classList.add('wt-shortcutbuttonmain');
      const color = r.color || p.color || [0.2588, 0.7137, 1, 1];
      el.style.borderColor = rgba(color);
      el.style.boxShadow = `inset 0 0 ${geo.width*zoom*0.1}px ${rgba(color, 0.08)}, 0 0 ${geo.width*zoom*0.05}px ${rgba(color, 0.25)}`;

      const iconDiv = document.createElement('div');
      iconDiv.className = 'sb-icon';
      iconDiv.style.fontSize = Math.max(7, fontPx * 0.9) + 'px';
      iconDiv.style.color = rgba(color, 0.7);
      iconDiv.style.borderRightColor = rgba(color, 0.35);
      iconDiv.style.background = rgba(color, 0.1);
      iconDiv.innerHTML = '&#9632;'; // placeholder icon

      const labelDiv = document.createElement('div');
      labelDiv.className = 'sb-label';
      const txt = cleanText(r.text || p.text || ctrl.name || '');
      labelDiv.textContent = txt;
      labelDiv.style.fontSize = Math.max(7, fontPx * 0.95) + 'px';

      el.appendChild(iconDiv);
      el.appendChild(labelDiv);
      break;
    }

    case 'shortcutbutton': {
      el.classList.add('wt-shortcutbutton');
      const color = r.color || p.color || [0.543, 0.574, 0.41, 1];
      el.style.borderColor = rgba(color);

      const iconDiv = document.createElement('div');
      iconDiv.className = 'sb-icon';
      iconDiv.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      iconDiv.style.color = rgba(color, 0.8);
      iconDiv.style.borderRightColor = rgba(color, 0.3);
      iconDiv.style.background = rgba(color, 0.08);
      iconDiv.innerHTML = '&#9632;';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'sb-label';
      labelDiv.textContent = cleanText(r.text || p.text || ctrl.name || '');
      labelDiv.style.fontSize = Math.max(6, fontPx * 0.85) + 'px';

      el.appendChild(iconDiv);
      el.appendChild(labelDiv);
      break;
    }

    case 'button':
    case 'button-main':
    case 'button-exit': {
      el.classList.add('wt-rscbutton');
      const bg = r.colorBackground || p.colorBackground;
      const ct = r.colorText || p.colorText || [1,1,1,0.8];

      if (wclass === 'button-main') {
        el.classList.add('wt-rscbutton-main');
      } else if (wclass === 'button-exit') {
        el.classList.add('wt-rscbutton-exit');
      } else if (Array.isArray(bg)) {
        el.style.background = rgba(bg);
      }

      el.style.color = rgba(ct);
      el.style.fontSize = Math.max(7, fontPx) + 'px';

      const txt = cleanText(r.text || p.text || ctrl.name || '');
      el.textContent = txt;
      break;
    }

    case 'listbox': {
      el.classList.add('wt-listbox');
      const bg = r.colorBackground || p.colorBackground || [0,0,0,1];
      if (Array.isArray(bg)) el.style.background = rgba(bg);

      const header = document.createElement('div');
      header.className = 'lb-header';
      header.textContent = cleanText(ctrl.name || '');
      header.style.fontSize = Math.max(6, fontPx * 0.75) + 'px';

      const rows = document.createElement('div');
      rows.className = 'lb-rows';
      // Render a few sample rows
      const sampleRows = ['Item 1', 'Item 2', 'Item 3', 'Item 4'];
      sampleRows.forEach((txt, i) => {
        const row = document.createElement('div');
        row.className = 'lb-row' + (i === 0 ? ' sel' : '');
        row.textContent = txt;
        row.style.fontSize = Math.max(5, fontPx * 0.7) + 'px';
        rows.appendChild(row);
      });

      el.appendChild(header);
      el.appendChild(rows);
      break;
    }

    case 'combo': {
      el.classList.add('wt-combo');
      const ct = r.colorText || p.colorText || [1,1,1,0.75];
      const color = r.color || p.color || [0.2588, 0.7137, 1, 1];

      const textEl = document.createElement('div');
      textEl.className = 'combo-text';
      textEl.textContent = cleanText(r.text || p.text || ctrl.name || '') || '---';
      textEl.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      textEl.style.color = rgba(ct);

      const arrowEl = document.createElement('div');
      arrowEl.className = 'combo-arrow';
      arrowEl.innerHTML = '&#9660;';
      arrowEl.style.color = rgba(color);
      arrowEl.style.fontSize = Math.max(6, fontPx * 0.7) + 'px';

      el.appendChild(textEl);
      el.appendChild(arrowEl);
      break;
    }

    case 'edit': {
      el.classList.add('wt-edit');
      // The ::after pseudo-element handles the cursor
      const inner = document.createElement('div');
      inner.className = 'edit-inner';
      inner.textContent = cleanText(r.text || p.text || '') || '';
      inner.style.fontSize = Math.max(6, fontPx * 0.8) + 'px';
      el.appendChild(inner);
      // Remove cursor in preview if text has content
      if (inner.textContent) el.style.setProperty('--edit-cursor-opacity', '0');
      break;
    }

    case 'picture': {
      el.classList.add('wt-picture');
      const ct = r.color || r.colorText || p.colorText || [0.75, 0.75, 0.75, 1];
      const colorVal = rgba(ct);
      el.style.borderColor = rgba(ct, 0.3);

      const iconDiv = document.createElement('div');
      iconDiv.className = 'pic-icon';
      iconDiv.style.color = colorVal;

      // Icon placeholder square
      const sq = document.createElement('div');
      sq.style.cssText = `width:${Math.max(8, geo.width*zoom*0.35)}px;height:${Math.max(8, geo.height*zoom*0.6)}px;border:1px solid currentColor;opacity:.5;border-radius:2px`;
      iconDiv.appendChild(sq);

      const lbl = document.createElement('div');
      lbl.style.cssText = `font-size:${Math.max(5, fontPx*0.55)}px;opacity:.6;margin-top:1px;overflow:hidden;max-width:${geo.width*zoom*0.9}px;text-align:center;white-space:nowrap;text-overflow:ellipsis`;
      lbl.textContent = cleanText(r.text || p.text || ctrl.name || '');
      iconDiv.appendChild(lbl);

      el.appendChild(iconDiv);
      break;
    }

    case 'structuredtext': {
      el.classList.add('wt-structuredtext');
      const ct = r.colorText || p.colorText || [1, 1, 0.7, 1];
      el.style.color = rgba(ct);
      el.style.fontSize = Math.max(6, fontPx * 0.85) + 'px';
      el.textContent = cleanText(r.text || p.text || ctrl.name || '');
      break;
    }

    case 'slider': {
      el.classList.add('wt-slider');
      const color = r.color || p.color || [1,1,1,0.4];

      const arrLeft = document.createElement('span');
      arrLeft.className = 'sl-arr';
      arrLeft.innerHTML = '&#9664;';

      const track = document.createElement('div');
      track.className = 'sl-track';
      const fill = document.createElement('div');
      fill.className = 'sl-fill';
      const thumb = document.createElement('div');
      thumb.className = 'sl-thumb';
      track.appendChild(fill);
      track.appendChild(thumb);

      const arrRight = document.createElement('span');
      arrRight.className = 'sl-arr';
      arrRight.innerHTML = '&#9654;';

      el.appendChild(arrLeft);
      el.appendChild(track);
      el.appendChild(arrRight);
      break;
    }

    case 'ctrlgroup': {
      el.classList.add('wt-ctrlgroup');
      // Render name label in edit mode
      if (editMode) {
        const lbl = document.createElement('div');
        lbl.style.cssText = `font-family:'JetBrains Mono',monospace;font-size:${Math.max(6, fontPx*0.6)}px;color:rgba(100,100,200,.7);padding:2px;`;
        lbl.textContent = ctrl.name;
        el.appendChild(lbl);
      }
      break;
    }

    default: // rsctext
    case 'rsctext': {
      el.classList.add('wt-rsctext');

      const ct = r.colorText || p.colorText;
      const bg = r.colorBackground || p.colorBackground;

      if (Array.isArray(ct)) el.style.color = rgba(ct);
      if (Array.isArray(bg) && (bg[3] || 0) > 0.01) {
        el.style.background = rgba(bg);
      } else {
        el.style.background = 'transparent';
      }

      el.style.fontSize = Math.max(6, fontPx) + 'px';

      // Apply text shadow
      const shadow = r.shadow !== undefined ? r.shadow : 2;
      if (shadow === 2) {
        el.style.textShadow = '1px 1px 2px rgba(0,0,0,.9)';
      } else if (shadow === 1) {
        el.style.textShadow = '0 0 3px rgba(0,0,0,.9),-1px -1px 0 rgba(0,0,0,.6),1px 1px 0 rgba(0,0,0,.6)';
      }

      const txt = r.text !== undefined ? r.text : p.text;
      el.textContent = cleanText(txt || ctrl.name || '');
      break;
    }
  }

  // Resize handle (edit mode)
  const rh = document.createElement('div');
  rh.className = 'rh';
  rh.dataset.resize = '1';
  rh.setAttribute('aria-hidden', 'true');
  el.appendChild(rh);

  // Events
  el.addEventListener('mousedown', (e) => onCtrlMouseDown(e, ctrl));
  el.title = ctrl.name + (ctrl.idc !== undefined && ctrl.idc >= 0 ? ' (idc ' + ctrl.idc + ')' : '');

  return el;
}

// ============================================================
// Render all
// ============================================================
function renderAll() {
  renderControls();
  renderLayers();
  renderInspector();
}

function renderControls() {
  const stage = document.getElementById('stage');
  // Clear
  stage.innerHTML = '';

  if (!displayData) return;

  const all = [...(displayData.background || []), ...(displayData.controls || [])];
  all.forEach((ctrl, i) => {
    const el = buildControlEl(ctrl, i + 1);
    stage.appendChild(el);
  });
}

// ============================================================
// Layer list
// ============================================================
function renderLayers() {
  const el = document.getElementById('layer-list');
  el.innerHTML = '';

  if (!displayData) return;

  function addSection(arr, label, isBg) {
    if (!arr || arr.length === 0) return;
    const hdr = document.createElement('div');
    hdr.className = 'layer-hdr';
    hdr.textContent = label;
    el.appendChild(hdr);

    arr.forEach(ctrl => {
      const row = document.createElement('div');
      row.className = 'layer-item' + (ctrl === selectedCtrl ? ' selected' : '') + (isBg ? ' bg-ctrl' : '');
      row.setAttribute('role', 'listitem');
      row.setAttribute('tabindex', '0');

      const dot = document.createElement('span');
      dot.className = 'layer-dot';
      dot.style.background = getWClassColor(getWClass(ctrl));
      dot.setAttribute('aria-hidden', 'true');
      row.appendChild(dot);

      const name = document.createElement('span');
      name.className = 'layer-name';
      name.textContent = ctrl.name;
      name.title = ctrl.name;
      row.appendChild(name);

      const idc = document.createElement('span');
      idc.className = 'layer-idc';
      idc.textContent = ctrl.idc !== undefined && ctrl.idc >= 0 ? ctrl.idc : '';
      row.appendChild(idc);

      row.addEventListener('click', () => selectCtrl(ctrl));
      row.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' || ev.key === ' ') { selectCtrl(ctrl); ev.preventDefault(); }
      });
      el.appendChild(row);
    });
  }

  addSection(displayData.background, 'controlsBackground', true);
  addSection(displayData.controls, 'controls', false);
}

function getWClassColor(wclass) {
  const map = {
    'shortcutbuttonmain': '#42b6ff',
    'shortcutbutton': '#8a9266',
    'button-main': '#2a80cc',
    'button': '#5c6536',
    'button-exit': '#802020',
    'iguiback': '#39414b',
    'rscframe': '#666',
    'mapcontrol': '#406030',
    'listbox': '#884488',
    'combo': '#b88820',
    'edit': '#804040',
    'picture': '#6a9040',
    'structuredtext': '#7a7020',
    'slider': '#609060',
    'ctrlgroup': '#4444aa',
    'rsctext': '#6a6050',
  };
  return map[wclass] || '#39414b';
}

// ============================================================
// Inspector
// ============================================================
function renderInspector() {
  const ctrl = selectedCtrl;
  const placeholder = document.getElementById('inspector-placeholder');
  const insp = document.getElementById('inspector');

  if (!ctrl) {
    placeholder.style.display = '';
    insp.style.display = 'none';
    return;
  }

  placeholder.style.display = 'none';
  insp.style.display = '';

  document.getElementById('insp-name').textContent = ctrl.name;
  document.getElementById('insp-baseclass').textContent = ctrl.baseClass || ctrl.rscBase || '—';

  document.getElementById('f-idc').value = ctrl.idc !== undefined ? ctrl.idc : -2;

  const r = ctrl.resolved || ctrl.props || {};
  const p = ctrl.props || {};

  document.getElementById('f-text').value = cleanText(r.text !== undefined ? r.text : (p.text || ''));

  // Geometry
  document.getElementById('insp-x').textContent = fmtVal(r.x !== undefined ? r.x : p.x);
  document.getElementById('insp-y').textContent = fmtVal(r.y !== undefined ? r.y : p.y);
  document.getElementById('insp-w').textContent = fmtVal(r.w !== undefined ? r.w : p.w);
  document.getElementById('insp-h').textContent = fmtVal(r.h !== undefined ? r.h : p.h);

  // Resolved props (skip geometry + giant arrays of textures)
  const resolvedEl = document.getElementById('insp-resolved');
  resolvedEl.innerHTML = '';
  const skipKeys = new Set(['x','y','w','h','idc','text','type','type_name',
    'animTextureNormal','animTextureDisabled','animTextureOver','animTextureFocused',
    'animTexturePressed','animTextureDefault','soundEnter','soundPush','soundClick','soundEscape',
    'period','periodFocus','periodOver','default','textureNoShortcut',
    'columns','maxHistoryDelay','autoScrollSpeed','autoScrollDelay','autoScrollRewind',
    'soundSelect','soundExpand','soundCollapse','soundDoubleClick','soundPush']);

  const colorKeys = new Set(['colorText','colorBackground','colorBackgroundActive','colorFocused',
    'colorShadow','colorBorder','colorDisabled','colorBackgroundDisabled','colorSelectBackground',
    'color','color2','colorBackground2','colorSelect','colorActive','colorOutside']);

  const importantKeys = ['colorText','colorBackground','colorFocused','color','sizeEx','shadow','font','style'];
  const resolvedEntries = Object.entries(ctrl.resolved || ctrl.props || {})
    .filter(([k]) => !skipKeys.has(k))
    .sort(([a],[b]) => {
      const ai = importantKeys.indexOf(a);
      const bi = importantKeys.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

  for (const [k, v] of resolvedEntries.slice(0, 20)) {
    const kEl = document.createElement('div');
    kEl.className = 'prop-k';
    kEl.textContent = k;
    resolvedEl.appendChild(kEl);

    const vEl = document.createElement('div');
    vEl.className = 'prop-v';

    if (colorKeys.has(k) && Array.isArray(v)) {
      const swatch = document.createElement('span');
      swatch.className = 'color-swatch';
      swatch.style.background = rgba(v);
      vEl.appendChild(swatch);
      vEl.appendChild(document.createTextNode(rgba(v)));
    } else {
      vEl.textContent = fmtVal(v);
    }
    resolvedEl.appendChild(vEl);
  }

  // Override props (delta)
  const overEl = document.getElementById('insp-overrides');
  overEl.innerHTML = '';
  for (const [k, v] of Object.entries(ctrl.props || {})) {
    if (skipKeys.has(k)) continue;
    const kEl = document.createElement('div');
    kEl.className = 'prop-k';
    kEl.style.color = 'var(--orange)';
    kEl.textContent = k;
    overEl.appendChild(kEl);

    const vEl = document.createElement('div');
    vEl.className = 'prop-v';
    if (colorKeys.has(k) && Array.isArray(v)) {
      const swatch = document.createElement('span');
      swatch.className = 'color-swatch';
      swatch.style.background = rgba(v);
      vEl.appendChild(swatch);
      vEl.appendChild(document.createTextNode(rgba(v)));
    } else {
      vEl.textContent = fmtVal(v);
    }
    overEl.appendChild(vEl);
  }

  if (overEl.children.length === 0) {
    const note = document.createElement('div');
    note.className = 'prop-k';
    note.style.gridColumn = '1/-1';
    note.textContent = '(no overrides — all inherited)';
    overEl.appendChild(note);
  }
}

function fmtVal(v) {
  if (v === null || v === undefined) return '—';
  if (Array.isArray(v)) {
    if (v.length <= 4 && v.every(x => typeof x === 'number')) {
      return '[' + v.map(x => parseFloat(x.toFixed(3))).join(', ') + ']';
    }
    return '[…]';
  }
  if (typeof v === 'number') return parseFloat(v.toFixed(6)).toString();
  return String(v);
}

// ============================================================
// Selection
// ============================================================
function selectCtrl(ctrl) {
  selectedCtrl = ctrl;
  renderControls();
  renderLayers();
  renderInspector();
}

// Click on empty stage
document.getElementById('stage').addEventListener('mousedown', e => {
  if (e.target === document.getElementById('stage')) selectCtrl(null);
});

// ============================================================
// Drag + Resize (edit mode only)
// ============================================================
function onCtrlMouseDown(e, ctrl) {
  selectCtrl(ctrl);
  if (!editMode) return;

  const isResize = e.target.dataset.resize === '1';
  const geo = ctrlPx(ctrl);
  const r = ctrl.resolved || ctrl.props || {};
  const p = ctrl.props || {};

  // Get current fractional coords
  const posSystem = (displayData && displayData.posSystem) || 'unit_square';
  const getF = (key) => {
    const raw = r[key] !== undefined ? r[key] : p[key];
    return posSystem === 'safezone' ? evalSZ(raw) : parseFloat(raw) || 0;
  };

  dragging = {
    ctrl, isResize,
    startMx: e.clientX, startMy: e.clientY,
    startX: getF('x'), startY: getF('y'),
    startW: getF('w'), startH: getF('h'),
    posSystem
  };

  e.stopPropagation();
  e.preventDefault();
}

document.addEventListener('mousemove', e => {
  // Update cursor readout
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / zoom;
  const my = (e.clientY - rect.top) / zoom;
  const fxc = (mx / STAGE_W).toFixed(3);
  const fyc = (my / STAGE_H).toFixed(3);
  document.getElementById('cursor-pos').textContent = 'x:' + fxc + ' y:' + fyc;

  if (!dragging || !editMode) return;

  const dx = (e.clientX - dragging.startMx) / (STAGE_W * zoom);
  const dy = (e.clientY - dragging.startMy) / (STAGE_H * zoom);
  const ctrl = dragging.ctrl;
  const p = ctrl.props;

  if (dragging.isResize) {
    p.w = snapVal(Math.max(0.005, dragging.startW + dx));
    p.h = snapVal(Math.max(0.002, dragging.startH + dy));
  } else {
    p.x = snapVal(Math.max(0, dragging.startX + dx));
    p.y = snapVal(Math.max(0, dragging.startY + dy));
  }

  // Sync to resolved
  if (ctrl.resolved) {
    if (dragging.isResize) { ctrl.resolved.w = p.w; ctrl.resolved.h = p.h; }
    else { ctrl.resolved.x = p.x; ctrl.resolved.y = p.y; }
  }

  renderControls();
  document.getElementById('insp-x').textContent = fmtVal(p.x);
  document.getElementById('insp-y').textContent = fmtVal(p.y);
  document.getElementById('insp-w').textContent = fmtVal(p.w);
  document.getElementById('insp-h').textContent = fmtVal(p.h);
});

document.addEventListener('mouseup', () => { dragging = null; });

function snapVal(v) {
  if (!document.getElementById('snap-chk').checked) return v;
  const step = parseFloat(document.getElementById('snap-size').value) || 0.01;
  return Math.round(v / step) * step;
}

// ============================================================
// Zoom + Stage size
// ============================================================
const stage = document.getElementById('stage');
const zoomLabel = document.getElementById('zoom-label');

function setZoom(z) {
  zoom = Math.max(0.2, Math.min(4, z));
  stage.style.width = (STAGE_W * zoom) + 'px';
  stage.style.height = (STAGE_H * zoom) + 'px';
  zoomLabel.textContent = Math.round(zoom * 100) + '%';
  renderControls();
}

document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoom + 0.1));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoom - 0.1));
document.getElementById('zoom-fit').addEventListener('click', () => {
  const wrap = document.getElementById('canvas-wrap');
  const wz = (wrap.clientWidth - 80) / STAGE_W;
  const hz = (wrap.clientHeight - 80) / STAGE_H;
  setZoom(Math.min(wz, hz, 1.5));
});

// Mouse-wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.1 : -0.1;
  setZoom(zoom + delta);
}, { passive: false });

// Stage resolution picker
document.getElementById('stage-res').addEventListener('change', e => {
  const parts = e.target.value.split(',');
  SCREEN_W = parseInt(parts[0]);
  SCREEN_H = parseInt(parts[1]);
  // Keep logical stage at half res (960x540 for 1920x1080, etc.)
  STAGE_W = SCREEN_W / 2;
  STAGE_H = SCREEN_H / 2;
  document.getElementById('stage-label').textContent = SCREEN_W + ' × ' + SCREEN_H;
  setZoom(zoom);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (inInput) return;

  if (e.key === 'Escape') { selectCtrl(null); e.preventDefault(); }
  if (e.key === '+' || e.key === '=') { setZoom(zoom + 0.1); e.preventDefault(); }
  if (e.key === '-') { setZoom(zoom - 0.1); e.preventDefault(); }
  if (e.key === 'f' || e.key === 'F') {
    document.getElementById('zoom-fit').click(); e.preventDefault();
  }
});

// ============================================================
// Edit / Preview mode toggle
// ============================================================
function setMode(isEdit) {
  editMode = isEdit;
  document.getElementById('btn-preview').classList.toggle('active', !isEdit);
  document.getElementById('btn-edit').classList.toggle('active', isEdit);
  renderControls();
}

document.getElementById('btn-preview').addEventListener('click', () => setMode(false));
document.getElementById('btn-edit').addEventListener('click', () => setMode(true));

// ============================================================
// Export
// ============================================================
function exportHpp() {
  if (!displayData) return '';
  const lines = [];
  const name = currentDisplay || 'WF_Menu';

  lines.push('class ' + name + ' {');
  lines.push('\tidd = ' + (displayData.idd || -1) + ';');
  if (displayData.movingEnable !== undefined) {
    lines.push('\tmovingEnable = ' + (displayData.movingEnable ? 1 : 0) + ';');
  }
  lines.push('');

  function emitSection(arr, sectionName) {
    lines.push('\tclass ' + sectionName + ' {');
    (arr || []).forEach(ctrl => {
      const base = ctrl.baseClass || ctrl.rscBase || '';
      lines.push('\t\tclass ' + ctrl.name + (base ? ' : ' + base : '') + ' {');
      const p = ctrl.props || {};
      for (const [k, v] of Object.entries(p)) {
        if (Array.isArray(v)) {
          lines.push('\t\t\t' + k + '[] = {' + v.map(x => typeof x === 'number' ? parseFloat(x.toFixed(6)) : x).join(', ') + '};');
        } else if (typeof v === 'string') {
          if (k === 'text' || k === 'tooltip' || k === 'action' || k === 'onButtonClick') {
            lines.push('\t\t\t' + k + ' = "' + v + '";');
          } else {
            lines.push('\t\t\t' + k + ' = ' + v + ';');
          }
        } else if (v !== null && v !== undefined) {
          lines.push('\t\t\t' + k + ' = ' + v + ';');
        }
      }
      lines.push('\t\t};');
    });
    lines.push('\t};');
  }

  emitSection(displayData.background, 'controlsBackground');
  lines.push('');
  emitSection(displayData.controls, 'controls');

  if (displayData.titlesArray) {
    lines.push('');
    lines.push('\tcontrols[] = {' + displayData.titlesArray.map(n => '"' + n + '"').join(', ') + '};');
  }

  lines.push('};');
  return lines.join('\n');
}

document.getElementById('export-btn').addEventListener('click', () => {
  document.getElementById('export-out').value = exportHpp();
  const body = document.getElementById('export-body');
  if (!body.classList.contains('open')) {
    body.classList.add('open');
    document.getElementById('export-tog-label').textContent = '▲';
    document.getElementById('export-toggle').setAttribute('aria-expanded', 'true');
  }
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const txt = document.getElementById('export-out').value;
  if (!txt) { setStatus('Nothing to copy.', 'err'); return; }
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('flash');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('flash'); }, 1400);
    setStatus('Copied.', 'ok');
  });
});

document.getElementById('download-btn').addEventListener('click', () => {
  const txt = document.getElementById('export-out').value;
  if (!txt) { setStatus('Nothing to download.', 'err'); return; }
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = (currentDisplay || 'WF_Menu') + '.hpp';
  a.click();
});

// ============================================================
// Export panel toggle
// ============================================================
document.getElementById('export-toggle').addEventListener('click', () => {
  const body = document.getElementById('export-body');
  const lbl = document.getElementById('export-tog-label');
  const hdr = document.getElementById('export-toggle');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  lbl.textContent = isOpen ? '▼' : '▲';
  hdr.setAttribute('aria-expanded', String(!isOpen));
});

document.getElementById('export-toggle').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('export-toggle').click(); }
});

// ============================================================
// Status
// ============================================================
function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type || '';
}

// ============================================================
// Boot
// ============================================================
setZoom(0.75); // default zoom so 1920x1080 frame fits in viewport
loadUiJson();
</script>
